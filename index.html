          {/* Connected user card */}
          {gdUser && gdUser.name ? (
            <div style={{ background:"rgba(66,133,244,0.08)", border:"1.5px solid rgba(66,133,244,0.25)", borderRadius:12, padding:"12px 16px", marginBottom:14, display:"flex", alignItems:"center", gap:12 }}>
              {gdUser.photo
                ? <img src={gdUser.photo} style={{ width:42, height:42, borderRadius:"50%", border:"2px solid #4285f4", flexShrink:0 }} alt=""/>
                : <div style={{ width:42, height:42, borderRadius:"50%", background:"#4285f4", display:"flex", alignItems:"center", justifyContent:"center", color:"white", fontWeight:700, fontSize:18, flexShrink:0 }}>{(gdUser.name||"?")[0]}</div>
              }
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontWeight:700, fontSize:13 }}>{gdUser.name}</div>
                <div style={{ fontSize:11, color:"#4285f4" }}>{gdUser.email}</div>
                <div style={{ fontSize:11, color:"#059669", marginTop:3 }}>
                  {gdSyncing ? "⏳ Syncing…" : gdLastSync ? `✅ Last synced: ${gdLastSync}` : "✅ Connected"}
                </div>
              </div>
            </div>
          ) : (
            <div style={{ background:"rgba(66,133,244,0.06)", border:"1.5px dashed rgba(66,133,244,0.35)", borderRadius:12, padding:"12px 16px", marginBottom:14, fontSize:13, color:"#4285f4" }}>
              {gdOk ? "✅ Connected to Google Drive" : "⏳ Auto-connecting… (click below if it doesn't connect in a few seconds)"}
            </div>
          )}

          {/* Message */}
          {gdMsg && (
            <div style={{ fontSize:13, fontWeight:600, padding:"8px 12px", borderRadius:8, marginBottom:12,
              color: gdMsg.startsWith("❌")?"#DC2626":"#059669",
              background: gdMsg.startsWith("❌")?"rgba(220,38,38,0.07)":"rgba(5,150,105,0.07)" }}>
              {gdMsg}
            </div>
          )}

          {/* Action buttons */}
          <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
            {!gdOk ? (
              <GlassBtn onClick={handleConnect} style={{ background:"linear-gradient(135deg,#4285F4,#1a73e8)", color:"white", border:"none", display:"flex", alignItems:"center", gap:8 }}>
                <svg width="16" height="16" viewBox="0 0 48 48"><path fill="#FFF" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#FFF" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FFF" d="M10.53 28.59c-.48-1.37-.76-2.84-.76-4.59s.27-3.22.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#FFF" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                Connect Google Account
              </GlassBtn>
            ) : (
              <>
                <GlassBtn onClick={handleManualSync} disabled={gdSyncing}
                  style={{ background:"linear-gradient(135deg,#34A853,#1e8e3e)", color:"white", border:"none" }}>
                  {gdSyncing ? "⏳ Syncing…" : "☁️ Sync Now"}
                </GlassBtn>
                <GlassBtn variant="outline" onClick={()=>{ gdSignOut(); setGdUser(null); setGdOk(false); }}>
                  Disconnect
                </GlassBtn>
              </>
            )}
          </div>
          <div style={{ marginTop:10, fontSize:11, color:"#4285f4", lineHeight:1.6 }}>
            💡 On a <strong>new browser/device</strong>: Google Drive connects automatically in the background.
            If the auto-connect fails, click <em>Connect Google Account</em> once — after that it's permanent.
          </div>
        </GlassCard>

        {/* ── Backup & Restore ── */}
        <GlassCard style={{ marginBottom:20, border:"2px solid rgba(5,150,105,0.3)" }}>
          <div style={{ fontWeight:700, fontSize:15, marginBottom:6, color:"#059669" }}>🛡️ Backup Status</div>
          <p style={{ fontSize:12, color:"var(--text-2)", marginBottom:14, lineHeight:1.6 }}>
            Your data is automatically saved in <strong>2 cloud locations</strong>:
            Firebase Firestore (real-time) and Google Drive (auto-backup on every change).<br/>
            {gdOk
              ? <span style={{color:"#059669",fontWeight:600}}>✅ Both backups active · {bills} invoices · {inv} inventory items</span>
              : <span style={{color:"#D97706",fontWeight:600}}>⚠️ Connect Google Drive above for a second cloud backup.</span>}
          </p>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(2,1fr)", gap:8, marginBottom:14 }}>
            {[
              { icon:"🔥", label:"Firestore", ok: window._FIREBASE_OK !== false, desc:"Real-time cloud sync" },
              { icon:"📁", label:"Google Drive", ok: gdOk, desc: gdOk ? (gdLastSync ? `Last: ${gdLastSync}` : "Connected") : "Not connected" },
            ].map(({icon,label,ok,desc})=>(
              <div key={label} style={{ background:ok?"rgba(5,150,105,0.08)":"rgba(220,38,38,0.08)", border:`1.5px solid ${ok?"rgba(5,150,105,0.3)":"rgba(220,38,38,0.3)"}`, borderRadius:10, padding:"14px 10px", textAlign:"center" }}>
                <div style={{fontSize:24}}>{icon}</div>
                <div style={{fontWeight:700,fontSize:12,color:ok?"#059669":"#DC2626",marginTop:4}}>{label}</div>
                <div style={{fontSize:11,color:"var(--text-3)",marginTop:2}}>{ok?"✅ Active":"⚠️ Offline"}</div>
                <div style={{fontSize:11,color:"var(--text-3)"}}>{desc}</div>
              </div>
            ))}
          </div>
          <div style={{ fontSize:11, color:"var(--text-3)", lineHeight:1.6, padding:"10px 12px", background:"rgba(5,150,105,0.05)", borderRadius:8 }}>
            💡 <strong>How it works:</strong> Every change saves instantly to Firebase. Google Drive also gets a copy within 1–2 seconds. On any new device, your data loads automatically from Firebase — no manual import needed.
          </div>
        </GlassCard>

        <GlassCard style={{ border:"2px solid rgba(220,38,38,0.3)" }}>
          <div style={{ fontWeight:700, fontSize:15, marginBottom:8, color:"var(--red)" }}>⚠️ Danger Zone</div>
          <p style={{ fontSize:13, color:"var(--text-2)", marginBottom:14 }}>These actions are irreversible. Please proceed with extreme caution.</p>
          <GlassBtn variant="danger" onClick={openClearModal}>🗑️ Clear All Transaction Data</GlassBtn>
        </GlassCard>
      </div>

      {/* ── Admin-protected Clear Data Modal ── */}
      {showClearModal && (
        <div style={{ position:"fixed", inset:0, background:"rgba(15,15,35,0.65)", backdropFilter:"blur(6px)", zIndex:2000, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
          <div className="animate-fade" style={{ background:"#fff", borderRadius:20, width:440, maxWidth:"100%", boxShadow:"0 24px 80px rgba(220,38,38,0.25)", border:"2px solid rgba(220,38,38,0.25)", overflow:"hidden" }}>

            {/* Header */}
            <div style={{ background:"linear-gradient(135deg,#DC2626,#EF4444)", padding:"18px 24px", display:"flex", alignItems:"center", gap:12 }}>
              <span style={{ fontSize:28 }}>🗑️</span>
              <div>
                <div style={{ fontWeight:800, fontSize:16, color:"#fff" }}>Clear All Transaction Data</div>
                <div style={{ fontSize:12, color:"rgba(255,255,255,0.8)", marginTop:2 }}>
                  Step {clearStep} of 3 — {clearStep===1?"Read warning":clearStep===2?"Verify identity":"Final confirmation"}
                </div>
              </div>
              <button onClick={closeClearModal} style={{ marginLeft:"auto", background:"rgba(255,255,255,0.2)", border:"none", cursor:"pointer", width:28, height:28, borderRadius:"50%", color:"#fff", fontSize:14, display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
            </div>

            <div style={{ padding:24 }}>
              {clearDone ? (
                <div style={{ textAlign:"center", padding:"16px 0" }}>
                  <div style={{ fontSize:40, marginBottom:10 }}>✅</div>
                  <div style={{ fontWeight:700, fontSize:16, color:"var(--green)" }}>Data Cleared Successfully</div>
                  <div style={{ fontSize:13, color:"var(--text-2)", marginTop:6 }}>All bills, expenses and payment logs have been deleted.</div>
                </div>
              ) : clearStep === 1 ? (
                <>
                  <div style={{ background:"rgba(220,38,38,0.07)", border:"1.5px solid rgba(220,38,38,0.25)", borderRadius:10, padding:"14px 16px", marginBottom:18 }}>
                    <div style={{ fontWeight:700, color:"var(--red)", marginBottom:8, fontSize:14 }}>⚠️ This action will permanently delete:</div>
                    <ul style={{ paddingLeft:18, fontSize:13, color:"var(--text-2)", lineHeight:2 }}>
                      <li>All Bills &amp; Invoices</li>
                      <li>All Expenses</li>
                      <li>All Payment Logs</li>
                    </ul>
                    <div style={{ marginTop:10, fontSize:13, fontWeight:600, color:"var(--red)" }}>This CANNOT be undone. Data will be gone forever.</div>
                  </div>
                  <div style={{ display:"flex", gap:10 }}>
                    <GlassBtn variant="ghost" onClick={closeClearModal} full>Cancel — Keep My Data</GlassBtn>
                    <GlassBtn variant="danger" onClick={handleClearStep2} full>I Understand, Continue →</GlassBtn>
                  </div>
                </>
              ) : clearStep === 2 ? (
                <>
                  <div style={{ marginBottom:16 }}>
                    <div style={{ fontWeight:600, fontSize:14, color:"var(--text)", marginBottom:6 }}>🔐 Admin Password Required</div>
                    <div style={{ fontSize:13, color:"var(--text-2)", marginBottom:14 }}>Enter the admin account password to authorize this action.</div>
                    <Field label="Admin Password">
                      <input type="password" value={adminPass} onChange={e=>{setAdminPass(e.target.value);setPassError("");}}
                        onKeyDown={e=>e.key==="Enter"&&handleClearStep3()}
                        placeholder="Enter admin password…" autoFocus/>
                    </Field>
                    {passError && <div style={{ color:"var(--red)", fontSize:13, fontWeight:600, marginTop:6 }}>{passError}</div>}
                  </div>
                  <div style={{ display:"flex", gap:10 }}>
                    <GlassBtn variant="ghost" onClick={closeClearModal} full>Cancel</GlassBtn>
                    <GlassBtn variant="danger" onClick={handleClearStep3} full>Verify Password →</GlassBtn>
                  </div>
                </>
              ) : (
                <>
                  <div style={{ background:"rgba(220,38,38,0.07)", border:"1.5px solid rgba(220,38,38,0.3)", borderRadius:10, padding:"14px 16px", marginBottom:18, textAlign:"center" }}>
                    <div style={{ fontSize:32, marginBottom:8 }}>☠️</div>
                    <div style={{ fontWeight:700, color:"var(--red)", fontSize:15 }}>Last Chance!</div>
                    <div style={{ fontSize:13, color:"var(--text-2)", marginTop:6 }}>Are you absolutely 100% sure you want to delete ALL transaction data? There is no undo.</div>
                  </div>
                  <div style={{ display:"flex", gap:10 }}>
                    <GlassBtn variant="ghost" onClick={closeClearModal} full>No, Go Back</GlassBtn>
                    <GlassBtn variant="danger" onClick={handleFinalClear} disabled={clearing} full>
                      {clearing ? "Deleting…" : "YES, DELETE EVERYTHING"}
                    </GlassBtn>
                  </div>
                </>
              )}
            </div>
          </div>
        </div>
      )}
    </PageWrap>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App() {
  const [loaded, setLoaded] = useState(false);
  const [dbTick, setDbTick] = useState(0);
  // Restore session: persist logged-in user across page refreshes
  const [user, setUser] = useState(() => {
    try {
      const saved = sessionStorage.getItem("rph_session_user");
      return saved ? JSON.parse(saved) : null;
    } catch(e) { return null; }
  });
  const [page, setPage] = useState("dashboard");

  // Init DB once on mount. The guard in initDB prevents double-runs.
  useEffect(() => {
    initDB(() => {
      setLoaded(true);
      // Auto-reconnect Google Drive silently after DB is ready
      setTimeout(() => gdAutoReconnect(), 1500);
    });
    const handleUpdate = () => setDbTick(t => t + 1);
    window.addEventListener('firebase_update', handleUpdate);
    return () => window.removeEventListener('firebase_update', handleUpdate);
  }, []);

  // When DB loads: (1) re-validate session user, (2) try "remember me" auto-login
  useEffect(() => {
    if (!loaded) return;
    // Validate existing session user
    if (user) {
      const users = LS.get("rph_users", []);
      const fresh = users.find(u => u.id === user.id);
      if (!fresh) { setUser(null); sessionStorage.removeItem("rph_session_user"); }
      else if (JSON.stringify(fresh) !== JSON.stringify(user)) setUser(fresh);
      return;
    }
    // Try "remember me" auto-login (only if no session user)
    (async () => {
      try {
        const savedUser = localStorage.getItem("rph_saved_username");
        const savedPw = localStorage.getItem("rph_saved_password");
        if (!savedUser || !savedPw) return;
        const users = LS.get("rph_users", []);
        const found = users.find(u => u.username === savedUser);
        if (!found) return;
        const h = await sha256(savedPw);
        if (h === found.passwordHash) {
          sessionStorage.setItem("rph_session_user", JSON.stringify(found));
          setUser(found);
        }
      } catch(e) { console.warn("Auto-login failed:", e); }
    })();
  }, [loaded]);

  if (!loaded) {
    return (
      <div style={{ display: "flex", flexDirection: "column", gap: 16, alignItems: "center", justifyContent: "center", height: "100vh", background: "var(--bg)", fontFamily: "'Outfit', sans-serif" }}>
        <div style={{ fontSize: 40, animation: "pulse 1.5s infinite" }}>🐾</div>
        <div style={{ fontSize: 18, fontWeight: 700, color: "var(--purple)" }}>Connecting to Cloud Database...</div>
        <div style={{ fontSize: 13, color: "var(--text-3)", marginTop: -8 }}>Syncing with Firebase…</div>
      </div>
    );
  }

  const logout = () => {
    if (window.confirm("Sign out?\n\nClick OK to sign out but keep 'Remember me' active (auto-login next time).\n\nHold Shift and click OK to fully sign out and clear saved credentials.")) {
      // Clear saved login if shift was held — we can't detect shift in confirm, so we offer a second dialog
      if (window.confirm("Clear saved login credentials? (You'll need to enter username/password next time)")) {
        try { localStorage.removeItem("rph_saved_username"); localStorage.removeItem("rph_saved_password"); } catch(e) {}
      }
      try { sessionStorage.removeItem("rph_session_user"); } catch(e) {}
      setUser(null); setPage("dashboard");
    }
  };

  if (!user) return (<><style>{STYLE}</style><Login onLogin={setUser}/></>);

  const canAccess = p => {
    const n = NAV.find(x=>x.id===p);
    if (!n || !n.roles) return true;
    return n.roles.includes(user.role);
  };

  const renderPage = () => {
    if (!canAccess(page)) return <PageWrap title="Access Denied"><Alert msg="You don't have permission to view this page."/></PageWrap>;
    switch(page) {
      case "dashboard": return <Dashboard user={user} setPage={setPage} dbTick={dbTick}/>;
      case "billing": return <Billing user={user} dbTick={dbTick}/>;
      case "pending": return <PendingPayments user={user} dbTick={dbTick}/>;
      case "inventory": return <Inventory user={user} dbTick={dbTick}/>;
      case "treatments": return <Treatments user={user} dbTick={dbTick}/>;
      case "expenses": return <Expenses user={user} dbTick={dbTick}/>;
      case "reports": return <Reports dbTick={dbTick}/>;
      case "users": return <Users currentUser={user} dbTick={dbTick}/>;
      case "settings": return <Settings user={user} dbTick={dbTick}/>;
      default: return <Dashboard user={user} setPage={setPage} dbTick={dbTick}/>;
    }
  };

  return (
    <>
      <style>{STYLE}</style>
      <div style={{ display:"flex" }}>
        <Sidebar page={page} setPage={setPage} user={user} onLogout={logout}/>
        <div style={{ marginLeft:"var(--sidebar-w)", flex:1, minHeight:"100vh", overflow:"auto" }}>
          {renderPage()}
        </div>
      </div>
    </>
  );
}

    // Mount the app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
