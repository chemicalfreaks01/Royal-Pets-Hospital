// ─── IN-HOUSE USAGE FORM ──────────────────────────────────────────────────────
function InHouseUsageForm({ user, onSaved }) {
  const [owner, setOwner] = useState("");
  const [pet, setPet] = useState("");
  const [phone, setPhone] = useState("");
  const [species, setSpecies] = useState("");
  const [breed, setBreed] = useState("");
  const [age, setAge] = useState("");
  const [sex, setSex] = useState("Male");
  const [comment, setComment] = useState("");
  const [doctorName, setDoctorName] = useState("");
  const [items, setItems] = useState([]);
  const [itemQuery, setItemQuery] = useState("");
  const [selectedId, setSelectedId] = useState("");
  const [dropOpen, setDropOpen] = useState(false);
  const [dropIdx, setDropIdx] = useState(-1);
  const [dropRect, setDropRect] = useState(null);
  const [qty, setQty] = useState(1);
  const [msg, setMsg] = useState("");
  const [success, setSuccess] = useState("");
  const searchRef = useRef(null);
  const inputRef = useRef(null);

  const inventory = LS.get("rph_inventory", []);
  const treatments = LS.get("rph_treatments", []);
  const sourceList = [...treatments.map(t=>({...t, _type:"treatment"})), ...inventory.map(i=>({...i, _type:"product", price:i.salePrice}))];
  const suggestions = itemQuery.trim()==="" ? sourceList : sourceList.filter(x=>x.name.toLowerCase().includes(itemQuery.toLowerCase()));
  const selectedObj = sourceList.find(x=>x.id===parseInt(selectedId) && x._type===(selectedId.includes("t_")?"treatment":"product")) || sourceList.find(x=>String(x.id)===String(selectedId));

  useEffect(()=>{
    const handler=(e)=>{ if(searchRef.current&&!searchRef.current.contains(e.target)) setDropOpen(false); };
    document.addEventListener("mousedown",handler);
    return ()=>document.removeEventListener("mousedown",handler);
  },[]);
  useEffect(()=>{
    if(dropOpen&&inputRef.current){ const r=inputRef.current.getBoundingClientRect(); setDropRect({top:r.bottom+4,left:r.left,width:r.width}); }
  },[dropOpen,itemQuery]);

  const handleSelect = (item) => { setSelectedId(String(item.id)+"_"+item._type); setItemQuery(item.name); setDropOpen(false); setDropIdx(-1); };

  const realSelectedObj = sourceList.find(x=>String(x.id)+"_"+x._type===selectedId)||null;

  const addItem = () => {
    if (!realSelectedObj) return setMsg("Select an item first.");
    const q = parseInt(qty)||1;
    if (realSelectedObj._type==="product" && realSelectedObj.quantity < q) return setMsg(`Only ${realSelectedObj.quantity} in stock.`);
    setItems(prev=>[...prev,{ id:Date.now(), refId:realSelectedObj.id, name:realSelectedObj.name, type:realSelectedObj._type, price:realSelectedObj.price||0, quantity:q, totalPrice:(realSelectedObj.price||0)*q }]);
    setSelectedId(""); setItemQuery(""); setQty(1); setMsg("");
  };

  const saveUsage = () => {
    if (!owner.trim()) return setMsg("Owner name required.");
    if (!pet.trim()) return setMsg("Pet name required.");
    if (items.length===0) return setMsg("Add at least one item.");
    const allBills = LS.get("rph_bills",[]);
    const allInv = LS.get("rph_inventory",[]);
    // Deduct stock for product items
    items.filter(i=>i.type==="product").forEach(item=>{
      const idx=allInv.findIndex(i=>i.id===item.refId);
      if(idx>=0) allInv[idx]={...allInv[idx],quantity:Math.max(0,allInv[idx].quantity-item.quantity)};
    });
    LS.set("rph_inventory",allInv);
    const gross = items.reduce((a,i)=>a+i.totalPrice,0);
    const bill = {
      id:nextId(allBills), invoiceNumber:invoiceNum(), ownerName:owner.trim(), petName:pet.trim(),
      phone:phone.trim(), species, breed, age, sex, date:Date.now(),
      totalAmount:gross, discountAmount:0, discountLabel:"",
      netPayable:0, totalPaid:0, remainingAmount:0, paymentStatus:"PAID",
      itemsJson:JSON.stringify(items), createdByUsername:user.username, paymentLogs:[],
      isInHouse:true, notes:comment.trim(), doctorName:doctorName.trim(),
    };
    allBills.push(bill); LS.set("rph_bills",allBills);
    setSuccess(`In-house usage recorded — ${bill.invoiceNumber}`);
    setTimeout(()=>{ setSuccess(""); onSaved(); },1400);
  };

  return (
    <div style={{ display:"flex", gap:20, flexWrap:"wrap" }}>
      <div style={{ flex:2, minWidth:340 }}>
        <Alert msg={msg}/><Alert msg={success} type="success"/>
        <div style={{ background:"rgba(217,119,6,0.1)", border:"1.5px solid rgba(217,119,6,0.4)", borderRadius:"var(--radius-sm)", padding:"10px 14px", marginBottom:16, fontSize:13, color:"#92400e", fontWeight:600 }}>
          🏥 In-House Use — Stock will be deducted but <strong>NO revenue</strong> will be counted in reports.
        </div>
        <GlassCard style={{ marginBottom:16 }}>
          <div style={{ fontWeight:700, fontSize:14, color:"var(--purple)", marginBottom:14 }}>1. Patient Info</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
            <Field label="Owner Name" required><input value={owner} onChange={e=>setOwner(e.target.value)}/></Field>
            <Field label="Pet Name" required><input value={pet} onChange={e=>setPet(e.target.value)}/></Field>
            <Field label="Phone"><input value={phone} onChange={e=>setPhone(e.target.value)} type="tel"/></Field>
            <Field label="Species"><input value={species} onChange={e=>setSpecies(e.target.value)} placeholder="Dog, Cat…"/></Field>
            <Field label="Breed"><input value={breed} onChange={e=>setBreed(e.target.value)}/></Field>
            <Field label="Age"><input value={age} onChange={e=>setAge(e.target.value)} placeholder="2 years"/></Field>
            <Field label="Sex"><select value={sex} onChange={e=>setSex(e.target.value)}><option>Male</option><option>Female</option><option>Unknown</option></select></Field>
            <Field label="Doctor Name"><input value={doctorName} onChange={e=>setDoctorName(e.target.value)} placeholder="e.g. Dr. Aamir Nazir"/></Field>
          </div>
          <Field label="Comments / Notes" style={{marginTop:4}}>
            <textarea value={comment} onChange={e=>setComment(e.target.value)} rows={3} placeholder="Diagnosis, treatment notes, reason for in-house use…"/>
          </Field>
        </GlassCard>
        <GlassCard style={{ marginBottom:16 }}>
          <div style={{ fontWeight:700, fontSize:14, color:"var(--purple)", marginBottom:14 }}>2. Items Used</div>
          <div style={{ display:"flex", gap:10, flexWrap:"wrap", alignItems:"flex-end" }}>
            <div style={{ flex:2, minWidth:200 }} ref={searchRef}>
              <Field label="Search Treatment or Product">
                <div style={{ position:"relative" }}>
                  <input ref={inputRef} value={itemQuery}
                    onChange={e=>{setItemQuery(e.target.value);setSelectedId("");setDropOpen(true);setDropIdx(-1);}}
                    onFocus={()=>setDropOpen(true)}
                    onKeyDown={e=>{
                      if(e.key==="Enter"&&!dropOpen&&realSelectedObj){e.preventDefault();addItem();return;}
                      if(!dropOpen||suggestions.length===0) return;
                      if(e.key==="ArrowDown"){e.preventDefault();setDropIdx(i=>Math.min(i+1,suggestions.length-1));}
                      else if(e.key==="ArrowUp"){e.preventDefault();setDropIdx(i=>Math.max(i-1,0));}
                      else if(e.key==="Enter"){e.preventDefault();if(dropIdx>=0)handleSelect(suggestions[dropIdx]);else if(suggestions.length===1)handleSelect(suggestions[0]);}
                      else if(e.key==="Escape") setDropOpen(false);
                    }}
                    placeholder="Type to search treatments or products…" autoComplete="off"/>
                  {(itemQuery||selectedId)&&<span onMouseDown={e=>{e.preventDefault();setItemQuery("");setSelectedId("");setDropOpen(true);}} style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",cursor:"pointer",color:"var(--text-3)",fontSize:14,lineHeight:1,userSelect:"none"}}>✕</span>}
                </div>
              </Field>
              {realSelectedObj&&<div style={{marginTop:4,fontSize:12,color:"var(--purple)",display:"flex",alignItems:"center",gap:6}}><span style={{background:"var(--purple-bg)",padding:"2px 8px",borderRadius:20,fontWeight:600}}>✓ {realSelectedObj.name}{realSelectedObj._type==="product"?` (${realSelectedObj.quantity} in stock)`:""}</span></div>}
              {dropOpen&&dropRect&&ReactDOM.createPortal(
                <div onMouseDown={e=>e.preventDefault()} style={{position:"fixed",top:dropRect.top,left:dropRect.left,width:dropRect.width,zIndex:99999,background:"#ffffff",border:"1.5px solid var(--purple-border)",borderRadius:"var(--radius-sm)",boxShadow:"0 12px 40px rgba(124,58,237,0.22)",maxHeight:260,overflowY:"auto"}}>
                  {suggestions.length===0
                    ?<div style={{padding:"12px 14px",fontSize:13,color:"var(--text-3)",textAlign:"center"}}>Nothing found — try a different name</div>
                    :<>
                      <div style={{padding:"6px 14px",fontSize:11,fontWeight:600,color:"var(--text-3)",background:"rgba(124,58,237,0.04)",borderBottom:"1px solid var(--purple-border)",letterSpacing:".4px",textTransform:"uppercase"}}>
                        {suggestions.length} item{suggestions.length!==1?"s":""} — click or use ↑↓ keys
                      </div>
                      {suggestions.map((item,i)=>{
                        const isActive=dropIdx===i; const isSelected=selectedId===String(item.id)+"_"+item._type;
                        const price=item._type==="treatment"?item.price:item.salePrice;
                        return(<div key={item.id+"_"+item._type} onMouseDown={e=>{e.preventDefault();handleSelect(item);}} onMouseEnter={()=>setDropIdx(i)} style={{padding:"10px 14px",cursor:"pointer",fontSize:13,background:isSelected?"var(--purple-bg)":isActive?"rgba(124,58,237,0.07)":"transparent",borderBottom:i<suggestions.length-1?"1px solid rgba(124,58,237,0.07)":"none",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            {isSelected&&<span style={{color:"var(--purple)",fontSize:12}}>✓</span>}
                            <span style={{color:"#1a1a2e",fontWeight:isSelected?600:400}}>{item.name}</span>
                            <span style={{fontSize:10,padding:"1px 6px",borderRadius:8,background:item._type==="treatment"?"rgba(5,150,105,0.1)":"rgba(124,58,237,0.1)",color:item._type==="treatment"?"#059669":"#7C3AED",fontWeight:600}}>{item._type==="treatment"?"Treatment":"Product"}</span>
                          </div>
                          <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
                            {item._type==="product"&&<span style={{fontSize:10,padding:"2px 7px",borderRadius:10,background:item.quantity<=0?"rgba(220,38,38,0.15)":item.quantity<=5?"rgba(220,38,38,0.1)":"rgba(5,150,105,0.1)",color:item.quantity<=0?"#DC2626":item.quantity<=5?"#DC2626":"#059669",fontWeight:600}}>{item.quantity<=0?"Out of stock":`${item.quantity} left`}</span>}
                            <span style={{fontSize:11,fontWeight:600,color:"var(--text-2)",fontFamily:"'JetBrains Mono',monospace"}}>Rs.{(price||0).toLocaleString()}</span>
                          </div>
                        </div>);
                      })}
                    </>
                  }
                </div>, document.body
              )}
            </div>
            <div style={{flex:"0 0 80px"}}><Field label="Qty"><input type="number" min={1} value={qty} onChange={e=>setQty(e.target.value)}/></Field></div>
            <div style={{paddingBottom:14}}><GlassBtn onClick={addItem}>Add</GlassBtn></div>
          </div>
          {items.length>0&&(
            <table style={{marginTop:8}}>
              <thead><tr><th>Item</th><th>Type</th><th>Qty</th><th>Cost Price</th><th></th></tr></thead>
              <tbody>{items.map(i=>(
                <tr key={i.id}>
                  <td style={{fontWeight:600}}>{i.name}</td>
                  <td><span className={`badge ${i.type==="treatment"?"badge-paid":"badge-purple"}`}>{i.type}</span></td>
                  <td>{i.quantity}</td>
                  <td style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>{pkr(i.price)}</td>
                  <td><GlassBtn size="xs" variant="danger" onClick={()=>setItems(prev=>prev.filter(x=>x.id!==i.id))}>✕</GlassBtn></td>
                </tr>
              ))}</tbody>
            </table>
          )}
        </GlassCard>
      </div>
      <div style={{ flex:1, minWidth:220 }}>
        <GlassCard style={{ position:"sticky", top:20, border:"2px solid rgba(217,119,6,0.4)" }}>
          <div style={{ fontWeight:700, fontSize:15, color:"#D97706", marginBottom:16 }}>🏥 In-House Summary</div>
          <div style={{ fontSize:13, color:"var(--text-2)", marginBottom:8 }}>Items cost (internal):</div>
          <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:18, fontWeight:800, color:"var(--text)", marginBottom:12 }}>{pkr(items.reduce((a,i)=>a+i.totalPrice,0))}</div>
          <div style={{ background:"rgba(217,119,6,0.1)", borderRadius:"var(--radius-sm)", padding:"8px 12px", fontSize:12, color:"#92400e", marginBottom:16 }}>
            ⚠️ This amount will <strong>NOT</strong> appear in revenue or profit reports.
          </div>
          <div style={{ fontSize:12, color:"var(--text-3)", marginBottom:16 }}>Items: {items.length} · Status: <strong style={{color:"var(--green)"}}>PAID (Internal)</strong></div>
          <GlassBtn full onClick={saveUsage} size="lg" style={{background:"linear-gradient(135deg,#D97706,#F59E0B)"}}>🏥 Record Usage</GlassBtn>
        </GlassCard>
      </div>
    </div>
  );
}

// ─── EDIT ITEMS MODAL (add / remove items from existing invoice) ──────────────
function EditItemsModal({ bill, user, onClose, onSaved }) {
  const [items, setItems] = useState(() => JSON.parse(bill.itemsJson || "[]"));
  const [addType, setAddType] = useState("treatment");
  const [itemQuery, setItemQuery] = useState("");
  const [selectedId, setSelectedId] = useState("");
  const [dropOpen, setDropOpen] = useState(false);
  const [dropIdx, setDropIdx] = useState(-1);
  const [dropRect, setDropRect] = useState(null);
  const [qty, setQty] = useState(1);
  const [msg, setMsg] = useState("");
  const searchRef = useRef(null);
  const inputRef = useRef(null);

  const treatments = LS.get("rph_treatments", []);
  const inventory = LS.get("rph_inventory", []);
  const sourceList = addType === "treatment" ? treatments : inventory;
  const suggestions = itemQuery.trim() === "" ? sourceList : sourceList.filter(x => x.name.toLowerCase().includes(itemQuery.toLowerCase()));
  const selectedObj = sourceList.find(x => x.id === parseInt(selectedId)) || null;

  useEffect(() => {
    const handler = (e) => { if (searchRef.current && !searchRef.current.contains(e.target)) setDropOpen(false); };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, []);
  useEffect(() => {
    if (dropOpen && inputRef.current) {
      const r = inputRef.current.getBoundingClientRect();
      setDropRect({ top: r.bottom + window.scrollY + 4, left: r.left + window.scrollX, width: r.width });
    }
  }, [dropOpen, itemQuery]);

  const handleSelectSuggestion = (item) => { setSelectedId(String(item.id)); setItemQuery(item.name); setDropOpen(false); setDropIdx(-1); setMsg(""); };

  const addItem = () => {
    if (!selectedObj) return setMsg("Select an item first.");
    const price = addType === "treatment" ? selectedObj.price : selectedObj.salePrice;
    const q = parseInt(qty) || 1;
    if (addType === "product" && selectedObj.quantity < q) return setMsg(`Only ${selectedObj.quantity} units in stock.`);
    setItems(prev => [...prev, { id: Date.now(), refId: selectedObj.id, name: selectedObj.name, type: addType, price, quantity: q, totalPrice: price * q }]);
    setSelectedId(""); setItemQuery(""); setQty(1); setMsg("");
  };

  const removeItem = (itemToRemove) => {
    setItems(prev => prev.filter(x => x.id !== itemToRemove.id));
  };

  const save = () => {
    if (items.length === 0) return setMsg("Invoice must have at least one item.");
    const originalItems = JSON.parse(bill.itemsJson || "[]");
    const allBills = LS.get("rph_bills", []);
    const allInv = LS.get("rph_inventory", []);
    const idx = allBills.findIndex(b => b.id === bill.id);
    if (idx < 0) return;

    // Restore stock for items that were removed
    originalItems.filter(i => i.type === "product").forEach(oi => {
      const stillInInvoice = items.find(ni => ni.refId === oi.refId && ni.type === "product");
      const removedQty = oi.quantity - (stillInInvoice ? stillInInvoice.quantity : 0);
      if (removedQty > 0) {
        const invIdx = allInv.findIndex(inv => inv.id === oi.refId);
        if (invIdx >= 0) allInv[invIdx] = { ...allInv[invIdx], quantity: allInv[invIdx].quantity + removedQty };
      }
    });
    // Deduct stock for newly added items
    items.filter(i => i.type === "product").forEach(ni => {
      const wasInOriginal = originalItems.find(oi => oi.refId === ni.refId && oi.type === "product");
      const addedQty = ni.quantity - (wasInOriginal ? wasInOriginal.quantity : 0);
      if (addedQty > 0) {
        const invIdx = allInv.findIndex(inv => inv.id === ni.refId);
        if (invIdx >= 0) allInv[invIdx] = { ...allInv[invIdx], quantity: Math.max(0, allInv[invIdx].quantity - addedQty) };
      }
    });
    LS.set("rph_inventory", allInv);

    const gross = items.reduce((a, i) => a + i.totalPrice, 0);
    const discAmt = allBills[idx].discountAmount || 0;
    const newNet = Math.max(0, gross - discAmt);
    const newPaid = Math.min(allBills[idx].totalPaid || 0, newNet);
    const newRem = Math.max(0, newNet - newPaid);
    const newStatus = newRem <= 0 && newNet > 0 ? "PAID" : newPaid > 0 ? "PARTIAL" : "PENDING";
    const log = { date: Date.now(), amount: 0, method: "Edit", by: user.username, action: "Invoice items edited" };
    allBills[idx] = {
      ...allBills[idx], itemsJson: JSON.stringify(items), totalAmount: gross,
      netPayable: newNet, totalPaid: newPaid, remainingAmount: newRem, paymentStatus: newStatus,
      paymentLogs: [...(allBills[idx].paymentLogs || []), log],
    };
    LS.set("rph_bills", allBills);
    onSaved();
  };

  const gross = items.reduce((a, i) => a + i.totalPrice, 0);

  return (
    <Modal title={`Edit Items — ${bill.invoiceNumber}`} onClose={onClose} width={720}>
      <Alert msg={msg} />
      <div style={{ background:"var(--blue-bg)", border:"1px solid rgba(37,99,235,0.3)", borderRadius:"var(--radius-sm)", padding:"10px 14px", marginBottom:14, fontSize:13, color:"var(--blue)", fontWeight:600 }}>
        ✏️ Add or remove items from this invoice. Stock will be updated automatically.
      </div>
      {/* Add item row */}
      <div style={{ display:"flex", gap:10, flexWrap:"wrap", alignItems:"flex-end", marginBottom:16 }}>
        <div style={{ flex:"0 0 130px" }}>
          <Field label="Type">
            <select value={addType} onChange={e=>{ setAddType(e.target.value); setSelectedId(""); setItemQuery(""); setDropOpen(false); }}>
              <option value="treatment">Treatment</option>
              <option value="product">Product</option>
            </select>
          </Field>
        </div>
        <div style={{ flex:2, minWidth:200 }} ref={searchRef}>
          <Field label="Search & Add Item">
            <div style={{ position:"relative" }}>
              <input ref={inputRef} value={itemQuery}
                onChange={e => { setItemQuery(e.target.value); setSelectedId(""); setDropOpen(true); setDropIdx(-1); }}
                onFocus={() => setDropOpen(true)}
                onKeyDown={e => {
                  if (!dropOpen || suggestions.length === 0) return;
                  if (e.key === "ArrowDown") { e.preventDefault(); setDropIdx(i => Math.min(i+1, suggestions.length-1)); }
                  else if (e.key === "ArrowUp") { e.preventDefault(); setDropIdx(i => Math.max(i-1, 0)); }
                  else if (e.key === "Enter" && dropIdx >= 0) { e.preventDefault(); handleSelectSuggestion(suggestions[dropIdx]); }
                  else if (e.key === "Escape") setDropOpen(false);
                }}
                placeholder="Type to search…" autoComplete="off" />
              {(itemQuery || selectedId) && <span onMouseDown={e=>{ e.preventDefault(); setItemQuery(""); setSelectedId(""); setDropOpen(true); }} style={{ position:"absolute", right:8, top:"50%", transform:"translateY(-50%)", cursor:"pointer", color:"var(--text-3)", fontSize:14, lineHeight:1, userSelect:"none" }}>✕</span>}
            </div>
          </Field>
          {selectedObj && <div style={{ marginTop:4, fontSize:12, color:"var(--purple)", display:"flex", alignItems:"center", gap:6 }}><span style={{ background:"var(--purple-bg)", padding:"2px 8px", borderRadius:20, fontWeight:600 }}>✓ {selectedObj.name} — {pkr(addType==="treatment"?selectedObj.price:selectedObj.salePrice)}{addType==="product"?` (${selectedObj.quantity} in stock)`:""}</span></div>}
          {dropOpen && dropRect && ReactDOM.createPortal(
            <div onMouseDown={e=>e.preventDefault()} style={{ position:"fixed", top:dropRect.top, left:dropRect.left, width:dropRect.width, zIndex:99999, background:"#ffffff", border:"1.5px solid var(--purple-border)", borderRadius:"var(--radius-sm)", boxShadow:"0 12px 40px rgba(124,58,237,0.22)", maxHeight:200, overflowY:"auto" }}>
              {suggestions.length === 0 ? <div style={{ padding:"12px 14px", fontSize:13, color:"var(--text-3)", textAlign:"center" }}>No items found</div> :
              suggestions.map((item, i) => {
                const isActive = dropIdx === i; const price = addType === "treatment" ? item.price : item.salePrice;
                return (
                  <div key={item.id} onMouseDown={e=>{ e.preventDefault(); handleSelectSuggestion(item); }} onMouseEnter={()=>setDropIdx(i)}
                    style={{ padding:"9px 14px", cursor:"pointer", fontSize:13, background:isActive?"rgba(124,58,237,0.07)":"transparent", borderBottom:i<suggestions.length-1?"1px solid rgba(124,58,237,0.1)":"none", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                    <span>{item.name}</span>
                    <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                      <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:11, color:"var(--purple)", fontWeight:600 }}>{pkr(price)}</span>
                      {addType==="product" && <span style={{ fontSize:10, padding:"2px 7px", borderRadius:10, background:item.quantity<=5?"rgba(220,38,38,0.1)":"rgba(5,150,105,0.1)", color:item.quantity<=5?"#DC2626":"#059669", fontWeight:600 }}>{item.quantity} left</span>}
                    </div>
                  </div>
                );
              })}
            </div>, document.body
          )}
        </div>
        <div style={{ flex:"0 0 80px" }}><Field label="Qty"><input type="number" min={1} value={qty} onChange={e=>setQty(e.target.value)}/></Field></div>
        <div style={{ paddingBottom:14 }}><GlassBtn onClick={addItem} variant="success">+ Add</GlassBtn></div>
      </div>
      {/* Items table */}
      <div style={{ border:"1.5px solid var(--purple-border)", borderRadius:"var(--radius-sm)", overflow:"hidden", marginBottom:16 }}>
        <table>
          <thead><tr><th>Item</th><th>Type</th><th>Qty</th><th>Price</th><th>Total</th><th>Remove</th></tr></thead>
          <tbody>
            {items.map(i => (
              <tr key={i.id}>
                <td style={{ fontWeight:600 }}>{i.name}</td>
                <td><span className={`badge ${i.type==="treatment"?"badge-paid":"badge-purple"}`}>{i.type}</span></td>
                <td>{i.quantity}</td>
                <td style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:12 }}>{pkr(i.price)}</td>
                <td style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:12, fontWeight:700 }}>{pkr(i.totalPrice)}</td>
                <td><GlassBtn size="xs" variant="danger" onClick={() => removeItem(i)}>✕ Remove</GlassBtn></td>
              </tr>
            ))}
            {items.length === 0 && <tr><td colSpan={6} style={{ textAlign:"center", color:"var(--text-3)", padding:16 }}>No items — add at least one above</td></tr>}
          </tbody>
        </table>
      </div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
        <div style={{ fontSize:14, fontWeight:700 }}>New Gross Total: <span style={{ color:"var(--purple)", fontFamily:"'JetBrains Mono',monospace" }}>{pkr(gross)}</span></div>
      </div>
      <div style={{ display:"flex", gap:8 }}>
        <GlassBtn full onClick={save}>💾 Save Changes</GlassBtn>
        <GlassBtn full variant="ghost" onClick={onClose}>Cancel</GlassBtn>
      </div>
    </Modal>
  );
}

// ─── RETURN MODAL (mark items as returned, restore stock, deduct revenue) ─────
function ReturnModal({ bill, user, onClose, onSaved }) {
  const originalItems = JSON.parse(bill.itemsJson || "[]");
  const [returnQtys, setReturnQtys] = useState(() => {
    const map = {};
    originalItems.forEach(i => { map[i.id] = 0; });
    return map;
  });
  const [returnNote, setReturnNote] = useState("");
  const [msg, setMsg] = useState("");

  const returnTotal = originalItems.reduce((a, i) => {
    const rq = parseInt(returnQtys[i.id]) || 0;
    return a + (rq * i.price);
  }, 0);

  const save = () => {
    const hasReturn = originalItems.some(i => (parseInt(returnQtys[i.id]) || 0) > 0);
    if (!hasReturn) return setMsg("Select at least one item to return.");
    for (const i of originalItems) {
      const rq = parseInt(returnQtys[i.id]) || 0;
      if (rq > i.quantity) return setMsg(`Cannot return more than ${i.quantity} of "${i.name}".`);
    }

    const allBills = LS.get("rph_bills", []);
    const allInv = LS.get("rph_inventory", []);
    const idx = allBills.findIndex(b => b.id === bill.id);
    if (idx < 0) return;

    // Restore stock for returned products
    originalItems.filter(i => i.type === "product").forEach(i => {
      const rq = parseInt(returnQtys[i.id]) || 0;
      if (rq > 0) {
        const invIdx = allInv.findIndex(inv => inv.id === i.refId);
        if (invIdx >= 0) allInv[invIdx] = { ...allInv[invIdx], quantity: allInv[invIdx].quantity + rq };
      }
    });
    LS.set("rph_inventory", allInv);

    // Build updated items list (reduce qty or remove)
    const updatedItems = originalItems.map(i => {
      const rq = parseInt(returnQtys[i.id]) || 0;
      const newQty = i.quantity - rq;
      return newQty > 0 ? { ...i, quantity: newQty, totalPrice: i.price * newQty } : null;
    }).filter(Boolean);

    const newGross = updatedItems.reduce((a, i) => a + i.totalPrice, 0);
    const newNet = Math.max(0, newGross - (allBills[idx].discountAmount || 0));
    const newPaid = Math.min(allBills[idx].totalPaid || 0, newNet);
    const newRem = Math.max(0, newNet - newPaid);
    const newStatus = updatedItems.length === 0 ? "PAID" : (newRem <= 0 && newNet >= 0 ? "PAID" : newPaid > 0 ? "PARTIAL" : "PENDING");
    const log = { date: Date.now(), amount: -returnTotal, method: "Return", by: user.username, action: `Return processed: -${pkr(returnTotal)}${returnNote ? " — " + returnNote : ""}` };

    allBills[idx] = {
      ...allBills[idx],
      itemsJson: JSON.stringify(updatedItems.length > 0 ? updatedItems : originalItems.map(i=>({...i,quantity:0,totalPrice:0}))),
      totalAmount: newGross,
      netPayable: newNet,
      totalPaid: newPaid,
      remainingAmount: newRem,
      paymentStatus: newStatus,
      hasReturn: true,
      returnAmount: (allBills[idx].returnAmount || 0) + returnTotal,
      paymentLogs: [...(allBills[idx].paymentLogs || []), log],
    };
    LS.set("rph_bills", allBills);
    onSaved();
  };

  return (
    <Modal title={`Process Return — ${bill.invoiceNumber}`} onClose={onClose} width={620}>
      <Alert msg={msg} />
      <div style={{ background:"rgba(220,38,38,0.08)", border:"1px solid rgba(220,38,38,0.25)", borderRadius:"var(--radius-sm)", padding:"10px 14px", marginBottom:14, fontSize:13, color:"var(--red)", fontWeight:600 }}>
        🔄 Select quantities to return. Stock will be restored and invoice amount reduced.
      </div>
      <div style={{ border:"1.5px solid var(--purple-border)", borderRadius:"var(--radius-sm)", overflow:"hidden", marginBottom:14 }}>
        <table>
          <thead><tr><th>Item</th><th>Type</th><th>Orig. Qty</th><th>Unit Price</th><th>Return Qty</th><th>Refund</th></tr></thead>
          <tbody>
            {originalItems.map(i => {
              const rq = parseInt(returnQtys[i.id]) || 0;
              return (
                <tr key={i.id}>
                  <td style={{ fontWeight:600 }}>{i.name}</td>
                  <td><span className={`badge ${i.type==="treatment"?"badge-paid":"badge-purple"}`}>{i.type}</span></td>
                  <td>{i.quantity}</td>
                  <td style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:12 }}>{pkr(i.price)}</td>
                  <td style={{ width:90 }}>
                    <input type="number" min={0} max={i.quantity} value={returnQtys[i.id]}
                      onChange={e => setReturnQtys(prev => ({ ...prev, [i.id]: Math.min(i.quantity, Math.max(0, parseInt(e.target.value)||0)) }))}
                      style={{ width:70 }} />
                  </td>
                  <td style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:12, color:rq>0?"var(--red)":"var(--text-3)", fontWeight:700 }}>
                    {rq > 0 ? `- ${pkr(rq * i.price)}` : "—"}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      <div style={{ background:"rgba(220,38,38,0.06)", border:"1px solid rgba(220,38,38,0.2)", borderRadius:"var(--radius-sm)", padding:"10px 14px", marginBottom:14, fontSize:14 }}>
        <div>Total Refund Amount: <strong style={{ color:"var(--red)", fontFamily:"'JetBrains Mono',monospace" }}>- {pkr(returnTotal)}</strong></div>
        <div style={{ fontSize:12, color:"var(--text-3)", marginTop:4 }}>New Invoice Net: <strong style={{ fontFamily:"'JetBrains Mono',monospace" }}>{pkr(Math.max(0, bill.netPayable - returnTotal))}</strong></div>
      </div>
      <Field label="Return Notes (optional)">
        <input value={returnNote} onChange={e=>setReturnNote(e.target.value)} placeholder="Reason for return, customer note…" />
      </Field>
      <div style={{ display:"flex", gap:8 }}>
        <GlassBtn full variant="danger" onClick={save}>🔄 Process Return</GlassBtn>
        <GlassBtn full variant="ghost" onClick={onClose}>Cancel</GlassBtn>
      </div>
    </Modal>
  );
}

// ─── PENDING PAYMENTS ─────────────────────────────────────────────────────────
function PendingPayments({ user, dbTick }) {
  const [bills, setBills] = useState(() => LS.get("rph_bills",[]).filter(b=>b.paymentStatus!=="PAID"));
  const [search, setSearch] = useState("");
  const [sort, setSort] = useState("latest");
  const [payBill, setPayBill] = useState(null);
  const [viewBill, setViewBill] = useState(null);

  const refresh = useCallback(() => setBills(LS.get("rph_bills",[]).filter(b=>b.paymentStatus!=="PAID")), []);
  useEffect(() => { refresh(); }, [dbTick, refresh]);

  const canCollect = ["ADMIN","DOCTOR","RECEPTIONIST"].includes(user.role);

  const filtered = useMemo(() => {
    let r = bills.filter(b =>
      b.ownerName?.toLowerCase().includes(search.toLowerCase()) ||
      b.petName?.toLowerCase().includes(search.toLowerCase()) ||
      b.invoiceNumber?.toLowerCase().includes(search.toLowerCase())
    );
    if (sort==="latest") r.sort((a,b)=>b.date-a.date);
    else if (sort==="highest") r.sort((a,b)=>b.remainingAmount-a.remainingAmount);
    return r;
  }, [bills, search, sort]);

  const total = filtered.reduce((a,b)=>a+(b.remainingAmount||0),0);

  return (
    <PageWrap title="Pending Payments" subtitle="Track and collect outstanding balances">
      <div style={{ display:"flex", gap:14, flexWrap:"wrap", marginBottom:20 }}>
        <StatCard label="Pending Invoices" value={filtered.length} icon="📋" />
        <StatCard label="Total Outstanding" value={pkr(total)} accent="var(--red)" icon="⏳" />
      </div>
      <GlassCard style={{ padding:0, overflow:"hidden" }}>
        <div style={{ padding:"14px 20px", borderBottom:"1px solid var(--purple-border)", display:"flex", gap:12, flexWrap:"wrap", alignItems:"center", background:"rgba(124,58,237,0.04)" }}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Real-time search…" style={{ flex:1, minWidth:200, maxWidth:340 }} />
          <div style={{ display:"flex", gap:6 }}>
            {[["latest","Latest First"],["highest","Highest Due"]].map(([k,l])=>(
              <button key={k} onClick={()=>setSort(k)} style={{ padding:"6px 14px", borderRadius:20, fontSize:12, fontWeight:600, background:sort===k?"linear-gradient(135deg,var(--purple),var(--purple-light))":"rgba(0,0,0,0.05)", color:sort===k?"white":"var(--text-2)", border:"none", cursor:"pointer" }}>{l}</button>
            ))}
          </div>
        </div>
        <div style={{overflowX:"auto"}}>
          <table>
            <thead><tr><th>Invoice</th><th>Owner</th><th>Pet</th><th>Date</th><th>Net</th><th>Paid</th><th>Remaining</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody>
              {filtered.map(b=>(
                <tr key={b.id}>
                  <td style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:"var(--purple)",fontWeight:700}}>{b.invoiceNumber}</td>
                  <td style={{fontWeight:600}}>{b.ownerName}</td>
                  <td>{b.petName}</td>
                  <td style={{fontSize:12,color:"var(--text-3)"}}>{fmtDate(b.date)}</td>
                  <td style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>{pkr(b.netPayable)}</td>
                  <td style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:"var(--green)"}}>{pkr(b.totalPaid)}</td>
                  <td style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:"var(--red)",fontWeight:700}}>{pkr(b.remainingAmount)}</td>
                  <td><span className={`badge badge-${b.paymentStatus.toLowerCase()}`}>{b.paymentStatus}</span></td>
                  <td>
                    <div style={{display:"flex",gap:4}}>
                      <GlassBtn size="xs" variant="outline" onClick={()=>setViewBill(b)}>View</GlassBtn>
                      {canCollect && <GlassBtn size="xs" variant="success" onClick={()=>setPayBill(b)}>Collect</GlassBtn>}
                    </div>
                  </td>
                </tr>
              ))}
              {filtered.length===0 && <tr><td colSpan={9} style={{textAlign:"center",padding:32,color:"var(--text-3)"}}>No pending payments found ✓</td></tr>}
            </tbody>
          </table>
        </div>
      </GlassCard>
      {payBill && <PaymentAdjustModal bill={payBill} user={user} onClose={()=>setPayBill(null)} onSaved={()=>{refresh();setPayBill(null);}}/>}
      {viewBill && <InvoiceModal bill={viewBill} onClose={()=>setViewBill(null)} user={user} onRefresh={()=>{refresh();setViewBill(null);}}/>}
    </PageWrap>
  );
}

// ─── INVENTORY ────────────────────────────────────────────────────────────────
function Inventory({ user, dbTick }) {
  const isAdmin = ["ADMIN","DOCTOR"].includes(user.role);
  const [items, setItems] = useState(()=>LS.get("rph_inventory",[]));
  const [cats, setCats] = useState(()=>LS.get("rph_inv_categories",[]));
  const [search, setSearch] = useState("");
  const [catFilter, setCatFilter] = useState("all");
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState({ name:"", categoryId:"", purchasePrice:"", salePrice:"", quantity:"", threshold:"5" });
  const [catModal, setCatModal] = useState(null);
  const [catForm, setCatForm] = useState({ name:"" });
  const [msg, setMsg] = useState("");

  const refresh = useCallback(() => { setItems(LS.get("rph_inventory",[])); setCats(LS.get("rph_inv_categories",[])); }, []);
  useEffect(() => { refresh(); }, [dbTick, refresh]);

  const catName = id => cats.find(c=>c.id===parseInt(id))?.name || "—";

  const filtered = useMemo(()=>items.filter(i=>{
    const matchSearch = i.name.toLowerCase().includes(search.toLowerCase());
    const matchCat = catFilter==="all" || i.categoryId===parseInt(catFilter);
    return matchSearch && matchCat;
  }), [items, search, catFilter]);

  const saveItem = () => {
    if (!form.name.trim()) return setMsg("Name required.");
    const all = LS.get("rph_inventory",[]);
    if (modal==="add") {
      const existing = all.find(i=>i.name.toLowerCase()===form.name.trim().toLowerCase());
      if (existing) {
        existing.quantity += parseInt(form.quantity)||0;
        LS.set("rph_inventory",all); refresh(); setModal(null); return;
      }
      all.push({ id:nextId(all), name:form.name.trim(), categoryId:parseInt(form.categoryId)||null, purchasePrice:parseFloat(form.purchasePrice)||0, salePrice:parseFloat(form.salePrice)||0, quantity:parseInt(form.quantity)||0, threshold:parseInt(form.threshold)||5 });
    } else {
      const idx=all.findIndex(i=>i.id===form.id); if(idx<0)return;
      all[idx]={ ...all[idx], name:form.name.trim(), categoryId:parseInt(form.categoryId)||null, purchasePrice:parseFloat(form.purchasePrice)||0, salePrice:parseFloat(form.salePrice)||0, quantity:parseInt(form.quantity)||0, threshold:parseInt(form.threshold)||5 };
    }
    LS.set("rph_inventory",all); refresh(); setModal(null);
  };

  const delItem = id => {
    if (!window.confirm("Delete item?")) return;
    LS.set("rph_inventory", LS.get("rph_inventory",[]).filter(i=>i.id!==id)); refresh();
  };

  const saveCat = () => {
    if (!catForm.name.trim()) return setMsg("Category name required.");
    const all = LS.get("rph_inv_categories",[]);
    if (catModal==="add") all.push({ id:nextId(all), name:catForm.name.trim() });
    else { const idx=all.findIndex(c=>c.id===catForm.id); if(idx>=0) all[idx].name=catForm.name.trim(); }
    LS.set("rph_inv_categories",all); refresh(); setCatModal(null);
  };

  const delCat = id => {
    if (items.some(i=>i.categoryId===id)) return alert("Cannot delete: items use this category.");
    if (!window.confirm("Delete category?")) return;
    LS.set("rph_inv_categories",LS.get("rph_inv_categories",[]).filter(c=>c.id!==id)); refresh();
  };

  return (
    <PageWrap title="Inventory" subtitle="Manage stock, categories and pricing"
      action={<div style={{display:"flex",gap:8}}>
        {isAdmin && <GlassBtn variant="outline" onClick={()=>{setCatForm({name:""});setCatModal("add");setMsg("");}}>+ Category</GlassBtn>}
        {isAdmin && <GlassBtn onClick={()=>{setForm({name:"",categoryId:"",purchasePrice:"",salePrice:"",quantity:"",threshold:"5"});setModal("add");setMsg("");}}>+ Add Item</GlassBtn>}
      </div>}>

      <GlassCard style={{ marginBottom:16, padding:"12px 16px" }}>
        <div style={{ display:"flex", gap:12, flexWrap:"wrap", alignItems:"center" }}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search items…" style={{ flex:1, minWidth:200, maxWidth:300 }} />
          <select value={catFilter} onChange={e=>setCatFilter(e.target.value)} style={{ width:180 }}>
            <option value="all">All Categories</option>
            {cats.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
          {isAdmin && (
            <div style={{ marginLeft:"auto", display:"flex", gap:6, flexWrap:"wrap" }}>
              {cats.map(c=>(
                <span key={c.id} className="badge badge-purple" style={{ cursor:"pointer", gap:4 }}>
                  {c.name}
                  <button onClick={()=>{setCatForm({...c});setCatModal("edit");setMsg("");}} style={{ background:"none", border:"none", cursor:"pointer", padding:"0 2px", color:"var(--purple)", fontSize:11 }}>✎</button>
                  <button onClick={()=>delCat(c.id)} style={{ background:"none", border:"none", cursor:"pointer", padding:"0 2px", color:"var(--red)", fontSize:11 }}>×</button>
                </span>
              ))}
            </div>
          )}
        </div>
      </GlassCard>

// ─── TREATMENTS ───────────────────────────────────────────────────────────────
function Treatments({ user, dbTick }) {
  const isAdmin = ["ADMIN","DOCTOR"].includes(user.role);
  const [items, setItems] = useState(()=>LS.get("rph_treatments",[]));
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState({ name:"", price:"" });
  const [msg, setMsg] = useState("");
  
  const refresh = useCallback(() => setItems(LS.get("rph_treatments",[])), []);
  useEffect(() => { refresh(); }, [dbTick, refresh]);

  const save = () => {
    if (!form.name.trim()) return setMsg("Name required.");
    const all = LS.get("rph_treatments",[]);
    if (modal==="add") {
      if (all.find(t=>t.name.toLowerCase()===form.name.trim().toLowerCase())) return setMsg("Treatment already exists.");
      all.push({ id:nextId(all), name:form.name.trim(), price:parseFloat(form.price)||0 });
    } else {
      const idx=all.findIndex(t=>t.id===form.id); if(idx>=0) all[idx]={...all[idx],name:form.name.trim(),price:parseFloat(form.price)||0};
    }
    LS.set("rph_treatments",all); refresh(); setModal(null);
  };

  const del = id => {
    if (!window.confirm("Delete treatment?")) return;
    LS.set("rph_treatments",LS.get("rph_treatments",[]).filter(t=>t.id!==id)); refresh();
  };

  return (
    <PageWrap title="Treatments" subtitle="Manage services and consultation fees"
      action={isAdmin && <GlassBtn onClick={()=>{setForm({name:"",price:""});setModal("add");setMsg("");}}>+ Add Treatment</GlassBtn>}>
      <GlassCard style={{ padding:0, overflow:"hidden" }}>
        <table>
          <thead><tr><th>#</th><th>Treatment Name</th><th>Price</th>{isAdmin&&<th>Actions</th>}</tr></thead>
          <tbody>
            {items.map((t,i)=>(
              <tr key={t.id}>
                <td style={{color:"var(--text-3)",fontSize:12}}>{i+1}</td>
                <td style={{fontWeight:600}}>{t.name}</td>
                <td style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,fontWeight:700,color:"var(--purple)"}}>{pkr(t.price)}</td>
                {isAdmin && <td><div style={{display:"flex",gap:4}}>
                  <GlassBtn size="xs" variant="outline" onClick={()=>{setForm({...t});setModal("edit");setMsg("");}}>Edit</GlassBtn>
                  <GlassBtn size="xs" variant="danger" onClick={()=>del(t.id)}>Del</GlassBtn>
                </div></td>}
              </tr>
            ))}
          </tbody>
        </table>
      </GlassCard>
      {modal && (
        <Modal title={modal==="add"?"Add Treatment":"Edit Treatment"} onClose={()=>setModal(null)} width={400}>
          <Alert msg={msg}/>
          <Field label="Treatment Name" required><input value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/></Field>
          <Field label="Price (PKR)" required><input type="number" min={0} value={form.price} onChange={e=>setForm({...form,price:e.target.value})}/></Field>
          <div style={{display:"flex",gap:8}}>
            <GlassBtn full onClick={save}>Save</GlassBtn>
            <GlassBtn full variant="ghost" onClick={()=>setModal(null)}>Cancel</GlassBtn>
          </div>
        </Modal>
      )}
    </PageWrap>
  );
}

// ─── EXPENSES ─────────────────────────────────────────────────────────────────
function Expenses({ user, dbTick }) {
  const isAdmin = user.role === "ADMIN";
  const [expenses, setExpenses] = useState(()=>LS.get("rph_expenses",[]));
  const [cats, setCats] = useState(()=>LS.get("rph_exp_categories",[]));
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState({ amount:"", description:"", categoryId:"", date:today() });
  const [catModal, setCatModal] = useState(null);
  const [catForm, setCatForm] = useState({ name:"" });
  const [catFilter, setCatFilter] = useState("all");
  const [msg, setMsg] = useState("");

  const refresh = useCallback(() => { setExpenses(LS.get("rph_expenses",[])); setCats(LS.get("rph_exp_categories",[])); }, []);
  useEffect(() => { refresh(); }, [dbTick, refresh]);

  const catName = id => cats.find(c=>c.id===parseInt(id))?.name||"Uncategorized";

  const filtered = useMemo(()=>expenses.filter(e=>catFilter==="all"||e.categoryId===parseInt(catFilter)).sort((a,b)=>b.date-a.date), [expenses,catFilter]);
  const total = filtered.reduce((a,e)=>a+e.amount,0);

  const save = () => {
    if (!form.amount||isNaN(parseFloat(form.amount))||parseFloat(form.amount)<=0) return setMsg("Valid amount required.");
    const all = LS.get("rph_expenses",[]);
    if (modal==="add") {
      all.push({ id:nextId(all), amount:parseFloat(form.amount), description:form.description.trim(), categoryId:parseInt(form.categoryId)||null, date:new Date(form.date).setHours(12,0,0,0), createdBy:user.username });
    } else {
      const idx=all.findIndex(e=>e.id===form.id); if(idx>=0) all[idx]={...all[idx],amount:parseFloat(form.amount),description:form.description.trim(),categoryId:parseInt(form.categoryId)||null,date:new Date(form.date).setHours(12,0,0,0)};
    }
    LS.set("rph_expenses",all); refresh(); setModal(null);
  };

  const del = id => { if (!window.confirm("Delete expense?")) return; LS.set("rph_expenses",LS.get("rph_expenses",[]).filter(e=>e.id!==id)); refresh(); };

  const saveCat = () => {
    if (!catForm.name.trim()) return;
    const all = LS.get("rph_exp_categories",[]);
    if (catModal==="add") all.push({ id:nextId(all), name:catForm.name.trim() });
    else { const idx=all.findIndex(c=>c.id===catForm.id); if(idx>=0) all[idx].name=catForm.name.trim(); }
    LS.set("rph_exp_categories",all); refresh(); setCatModal(null);
  };

  const delCat = id => {
    if (expenses.some(e=>e.categoryId===id)) return alert("Cannot delete: expenses use this category.");
    if (!window.confirm("Delete category?")) return;
    LS.set("rph_exp_categories",LS.get("rph_exp_categories",[]).filter(c=>c.id!==id)); refresh();
  };

  return (
    <PageWrap title="Expenses" subtitle="Track and categorize all clinic expenses"
      action={<div style={{display:"flex",gap:8}}>
        {isAdmin && <GlassBtn variant="outline" onClick={()=>{setCatForm({name:""});setCatModal("add");}}>+ Category</GlassBtn>}
        <GlassBtn onClick={()=>{setForm({amount:"",description:"",categoryId:"",date:today()});setModal("add");setMsg("");}}>+ Add Expense</GlassBtn>
      </div>}>

      <div style={{ display:"flex", gap:14, flexWrap:"wrap", marginBottom:20 }}>
        <StatCard label="Total Expenses (Filtered)" value={pkr(total)} accent="var(--amber)" icon="💸"/>
        <StatCard label="Expense Count" value={filtered.length} icon="📋" sub="in view"/>
      </div>

      <GlassCard style={{ marginBottom:16, padding:"12px 16px" }}>
        <div style={{ display:"flex", gap:10, flexWrap:"wrap", alignItems:"center" }}>
          <select value={catFilter} onChange={e=>setCatFilter(e.target.value)} style={{ width:200 }}>
            <option value="all">All Categories</option>
            {cats.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
          {isAdmin && cats.map(c=>(
            <span key={c.id} className="badge badge-partial" style={{ cursor:"pointer", gap:4 }}>
              {c.name}
              <button onClick={()=>{setCatForm({...c});setCatModal("edit");}} style={{ background:"none",border:"none",cursor:"pointer",padding:"0 2px",color:"var(--amber)",fontSize:11 }}>✎</button>
              <button onClick={()=>delCat(c.id)} style={{ background:"none",border:"none",cursor:"pointer",padding:"0 2px",color:"var(--red)",fontSize:11 }}>×</button>
            </span>
          ))}
        </div>
      </GlassCard>

      <GlassCard style={{ padding:0, overflow:"hidden" }}>
        <div style={{overflowX:"auto"}}>
          <table>
            <thead><tr><th>Date</th><th>Description</th><th>Category</th><th>Amount</th><th>Added By</th><th>Actions</th></tr></thead>
            <tbody>
              {filtered.map(e=>(
                <tr key={e.id}>
                  <td style={{fontSize:12,color:"var(--text-3)"}}>{fmtDate(e.date)}</td>
                  <td style={{fontWeight:500}}>{e.description||"—"}</td>
                  <td><span className="badge badge-partial">{catName(e.categoryId)}</span></td>
                  <td style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,fontWeight:700,color:"var(--amber)"}}>{pkr(e.amount)}</td>
                  <td style={{fontSize:12,color:"var(--text-3)"}}>{e.createdBy||"—"}</td>
                  <td>
                    <div style={{display:"flex",gap:4}}>
                      <GlassBtn size="xs" variant="outline" onClick={()=>{setForm({...e,date:new Date(e.date).toISOString().slice(0,10)});setModal("edit");setMsg("");}}>Edit</GlassBtn>
                      <GlassBtn size="xs" variant="danger" onClick={()=>del(e.id)}>Del</GlassBtn>
                    </div>
                  </td>
                </tr>
              ))}
              {filtered.length===0 && <tr><td colSpan={6} style={{textAlign:"center",padding:32,color:"var(--text-3)"}}>No expenses found</td></tr>}
            </tbody>
          </table>
        </div>
      </GlassCard>

      {modal && (
        <Modal title={modal==="add"?"Add Expense":"Edit Expense"} onClose={()=>setModal(null)} width={440}>
          <Alert msg={msg}/>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
            <Field label="Amount (PKR)" required><input type="number" min={0} value={form.amount} onChange={e=>setForm({...form,amount:e.target.value})}/></Field>
            <Field label="Date" required><input type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})}/></Field>
            <Field label="Category" style={{gridColumn:"1/-1"}}>
              <select value={form.categoryId} onChange={e=>setForm({...form,categoryId:e.target.value})}>
                <option value="">— select category —</option>
                {cats.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
            </Field>
            <Field label="Description" style={{gridColumn:"1/-1"}}><textarea value={form.description} onChange={e=>setForm({...form,description:e.target.value})} rows={2} style={{resize:"vertical"}}/></Field>
          </div>
          <div style={{display:"flex",gap:8,marginTop:4}}>
            <GlassBtn full onClick={save}>Save</GlassBtn>
            <GlassBtn full variant="ghost" onClick={()=>setModal(null)}>Cancel</GlassBtn>
          </div>
        </Modal>
      )}

      {catModal && (
        <Modal title={catModal==="add"?"Add Category":"Edit Category"} onClose={()=>setCatModal(null)} width={360}>
          <Field label="Category Name"><input value={catForm.name} onChange={e=>setCatForm({...catForm,name:e.target.value})}/></Field>
          <div style={{display:"flex",gap:8}}>
            <GlassBtn full onClick={saveCat}>Save</GlassBtn>
            <GlassBtn full variant="ghost" onClick={()=>setCatModal(null)}>Cancel</GlassBtn>
          </div>
        </Modal>
      )}
    </PageWrap>
  );
}

// ─── REPORTS ──────────────────────────────────────────────────────────────────
function Reports({ dbTick }) {
  const [filter, setFilter] = useState("month");
  const [from, setFrom] = useState(today());
  const [to, setTo] = useState(today());
  const [sMs, eMs] = dateRange(filter, from, to);
  
  const allBills = LS.get("rph_bills",[]);
  const allExp = LS.get("rph_expenses",[]);
  const expCats = LS.get("rph_exp_categories",[]);
  
  const bills = allBills.filter(b=>b.date>=sMs&&b.date<=eMs);
  const expenses = allExp.filter(e=>e.date>=sMs&&e.date<=eMs);
  const revenue = bills.filter(b=>!b.isInHouse).reduce((a,b)=>a+(b.totalPaid||0),0);
  const exp = expenses.reduce((a,e)=>a+e.amount,0);
  const profit = revenue-exp;
  const pending = allBills.filter(b=>b.paymentStatus!=="PAID"&&!b.isInHouse).reduce((a,b)=>a+(b.remainingAmount||0),0);

  // ── In-House Usage stats ──
  const inhouseBills = bills.filter(b=>b.isInHouse);
  const inhouseCostTotal = inhouseBills.reduce((a,b)=>a+(b.totalAmount||0),0);
  const inhouseByItem = {};
  inhouseBills.forEach(b=>{
    try {
      const items = JSON.parse(b.itemsJson||"[]");
      items.forEach(i=>{
        if (!inhouseByItem[i.name]) inhouseByItem[i.name]={ name:i.name, type:i.type, qty:0, cost:0 };
        inhouseByItem[i.name].qty += i.quantity;
        inhouseByItem[i.name].cost += i.totalPrice||0;
      });
    } catch(e){}
  });
  const inhouseItemList = Object.values(inhouseByItem).sort((a,b)=>b.cost-a.cost);
  const inhouseByDate = {};
  inhouseBills.forEach(b=>{ const d=fmtDate(b.date); inhouseByDate[d]=(inhouseByDate[d]||0)+(b.totalAmount||0); });

  const byDate={}, expByDate={};
  bills.filter(b=>!b.isInHouse).forEach(b=>{ const d=fmtDate(b.date); byDate[d]=(byDate[d]||0)+(b.totalPaid||0); });
  expenses.forEach(e=>{ const d=fmtDate(e.date); expByDate[d]=(expByDate[d]||0)+e.amount; });
  const allDates=[...new Set([...Object.keys(byDate),...Object.keys(expByDate)])].sort();

  const expByCat = expenses.reduce((a,e)=>{ const nm=expCats.find(c=>c.id===e.categoryId)?.name||"Other"; a[nm]=(a[nm]||0)+e.amount; return a; },{});

  const printReport = () => {
    const w=window.open("","_blank","width=780,height=1000");
    w.document.write(`<!DOCTYPE html><html><head><title>Financial Report</title>
    <style>@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap');
    body{font-family:'Outfit',Arial,sans-serif;padding:32px;color:#1a1a2e;background:#fff}
    h1{color:#7C3AED;font-size:22px;font-weight:800;margin-bottom:4px}
    .row{display:flex;gap:16px;margin-bottom:20px}.card{flex:1;border:2px solid #EDE9FE;border-radius:12px;padding:16px;text-align:center;background:#faf5ff}
    .label{font-size:11px;color:#7C3AED;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
    .value{font-size:22px;font-weight:800;margin-top:6px;font-family:monospace}
    table{width:100%;border-collapse:collapse;margin-bottom:20px}
    th{background:#faf5ff;padding:9px 12px;font-size:11px;text-transform:uppercase;color:#7C3AED;font-weight:700;border-bottom:2px solid #EDE9FE;text-align:left}
    td{padding:8px 12px;border-bottom:1px solid #faf5ff;font-size:12px}
    h2{font-size:15px;font-weight:700;color:#1a1a2e;margin:20px 0 10px}
    @media print{button{display:none!important}}</style></head><body>
    <h1>🐾 ROYAL PETS HOSPITAL — Financial Report</h1>
    <p style="color:#64748b;font-size:12px;margin-bottom:20px">Period: ${filter==="custom"?from+" to "+to:filter==="today"?"Today":filter==="week"?"This Week":filter==="lastweek"?"Last Week":"This Month"} | Generated: ${new Date().toLocaleString()}</p>
    <div class="row">
      <div class="card"><div class="label">Revenue (Collected)</div><div class="value" style="color:#7C3AED">Rs. ${revenue.toLocaleString("en-PK",{minimumFractionDigits:2})}</div></div>
      <div class="card"><div class="label">Total Expenses</div><div class="value" style="color:#D97706">Rs. ${exp.toLocaleString("en-PK",{minimumFractionDigits:2})}</div></div>
      <div class="card"><div class="label">Net Profit</div><div class="value" style="color:${profit>=0?"#059669":"#DC2626"}">Rs. ${profit.toLocaleString("en-PK",{minimumFractionDigits:2})}</div></div>
      <div class="card"><div class="label">Pending (All Time)</div><div class="value" style="color:#DC2626">Rs. ${pending.toLocaleString("en-PK",{minimumFractionDigits:2})}</div></div>
    </div>
    <h2>🏥 In-House Usage Summary</h2>
    <div class="row">
      <div class="card"><div class="label">Total Sessions</div><div class="value" style="color:#D97706">${inhouseBills.length}</div></div>
      <div class="card"><div class="label">Total Cost Value</div><div class="value" style="color:#D97706">Rs. ${inhouseCostTotal.toLocaleString("en-PK",{minimumFractionDigits:2})}</div></div>
      <div class="card"><div class="label">Unique Items Used</div><div class="value" style="color:#D97706">${inhouseItemList.length}</div></div>
    </div>
    ${inhouseItemList.length>0?`<table><thead><tr><th>Item</th><th>Type</th><th>Qty Used</th><th>Cost Value</th></tr></thead><tbody>
    ${inhouseItemList.map(i=>`<tr><td>${i.name}</td><td style="color:#7C3AED;font-weight:600">${i.type}</td><td>${i.qty}</td><td style="color:#D97706;font-weight:700">Rs. ${i.cost.toLocaleString("en-PK",{minimumFractionDigits:2})}</td></tr>`).join("")}
    </tbody></table>`:"<p style='color:#94a3b8;font-size:13px'>No in-house usage in this period.</p>"}
    <h2>Daily Breakdown</h2>
    <table><thead><tr><th>Date</th><th>Revenue</th><th>Expenses</th><th>Net Profit</th></tr></thead><tbody>
    ${allDates.map(d=>`<tr><td>${d}</td><td style="color:#7C3AED;font-weight:700">Rs. ${(byDate[d]||0).toLocaleString("en-PK",{minimumFractionDigits:2})}</td><td style="color:#D97706;font-weight:700">Rs. ${(expByDate[d]||0).toLocaleString("en-PK",{minimumFractionDigits:2})}</td><td style="color:${(byDate[d]||0)-(expByDate[d]||0)>=0?"#059669":"#DC2626"};font-weight:700">Rs. ${((byDate[d]||0)-(expByDate[d]||0)).toLocaleString("en-PK",{minimumFractionDigits:2})}</td></tr>`).join("")}
    </tbody></table>
    <h2>Expense Category Breakdown</h2>
    <table><thead><tr><th>Category</th><th>Total</th><th>% of Expenses</th></tr></thead><tbody>
    ${Object.entries(expByCat).map(([cat,amt])=>`<tr><td>${cat}</td><td style="color:#D97706;font-weight:700">Rs. ${amt.toLocaleString("en-PK",{minimumFractionDigits:2})}</td><td>${exp>0?((amt/exp)*100).toFixed(1):0}%</td></tr>`).join("")}
    </tbody></table>
    <br><button onclick="window.print()" style="background:linear-gradient(135deg,#7C3AED,#A855F7);color:white;border:none;padding:10px 24px;border-radius:8px;font-weight:700;cursor:pointer;font-size:14px">🖨️ Print / Save PDF</button>
    </body></html>`);
    w.document.close();
  };

  return (
    <PageWrap title="Financial Reports" subtitle="Insights, analytics and PDF exports"
      action={<GlassBtn onClick={printReport}>🖨️ Export PDF Report</GlassBtn>}>

      {/* Filters */}
      <GlassCard style={{ marginBottom:20, padding:"12px 16px" }}>
        <div style={{ display:"flex", gap:8, flexWrap:"wrap", alignItems:"center" }}>
          {[["today","Today"],["week","This Week"],["lastweek","Last Week"],["month","This Month"],["all","All Time"],["custom","Custom Range"]].map(([k,l])=>(
            <button key={k} onClick={()=>setFilter(k)} style={{ padding:"6px 16px", borderRadius:20, fontSize:12, fontWeight:600, background:filter===k?"linear-gradient(135deg,var(--purple),var(--purple-light))":"rgba(0,0,0,0.05)", color:filter===k?"white":"var(--text-2)", border:"none", cursor:"pointer", transition:"var(--transition)" }}>{l}</button>
          ))}
          {filter==="custom" && <>

// ─── USERS ────────────────────────────────────────────────────────────────────
function Users({ currentUser, dbTick }) {
  const [users, setUsers] = useState(()=>LS.get("rph_users",[]));
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState({ username:"", password:"", role:"RECEPTIONIST" });
  const [msg, setMsg] = useState("");
  const [ownPw, setOwnPw] = useState({ old:"", newPw:"", confirm:"" });
  const [ownMsg, setOwnMsg] = useState("");
  const [showOwn, setShowOwn] = useState(false);
  
  const refresh = useCallback(() => setUsers(LS.get("rph_users",[])), []);
  useEffect(() => { refresh(); }, [dbTick, refresh]);

  const save = async () => {
    if (!form.username.trim()) return setMsg("Username required.");
    const all = LS.get("rph_users",[]);
    if (modal==="add") {
      if (!form.password) return setMsg("Password required.");
      if (form.password.length<6) return setMsg("Password must be 6+ chars.");
      if (all.find(u=>u.username===form.username.trim())) return setMsg("Username taken.");
      const h=await sha256(form.password);
      all.push({ id:nextId(all), username:form.username.trim(), passwordHash:h, role:form.role });
    } else {
      const idx=all.findIndex(u=>u.id===form.id); if(idx<0)return;
      if (all.find(u=>u.username===form.username.trim()&&u.id!==form.id)) return setMsg("Username taken.");
      const h=form.password?await sha256(form.password):all[idx].passwordHash;
      all[idx]={...all[idx],username:form.username.trim(),passwordHash:h,role:form.role};
    }
    LS.set("rph_users",all); refresh(); setModal(null);
  };

  const del = id => {
    if (id===currentUser.id) return alert("Cannot delete yourself.");
    const all=LS.get("rph_users",[]);
    if (!window.confirm("Delete user?")) return;
    LS.set("rph_users",all.filter(u=>u.id!==id)); refresh();
  };

  const changeOwnPw = async () => {
    if (!ownPw.old||!ownPw.newPw||!ownPw.confirm) return setOwnMsg("Fill all fields.");
    if (ownPw.newPw!==ownPw.confirm) return setOwnMsg("Passwords don't match.");
    if (ownPw.newPw.length<6) return setOwnMsg("6+ characters required.");
    const all=LS.get("rph_users",[]); const idx=all.findIndex(u=>u.id===currentUser.id);
    const oldH=await sha256(ownPw.old);
    if (all[idx].passwordHash!==oldH) return setOwnMsg("Incorrect current password.");
    all[idx].passwordHash=await sha256(ownPw.newPw);
    LS.set("rph_users",all); refresh(); setOwnPw({old:"",newPw:"",confirm:""}); setOwnMsg(""); setShowOwn(false);
    alert("Password changed successfully!");
  };

  const roleColors = { ADMIN:"badge-paid", DOCTOR:"badge-purple", RECEPTIONIST:"badge-partial" };

  return (
    <PageWrap title="User Management" subtitle="Manage system users and permissions"
      action={<div style={{display:"flex",gap:8}}>
        <GlassBtn variant="outline" onClick={()=>setShowOwn(true)}>🔑 Change My Password</GlassBtn>
        <GlassBtn onClick={()=>{setForm({username:"",password:"",role:"RECEPTIONIST"});setModal("add");setMsg("");}}>+ Add User</GlassBtn>
      </div>}>

      <GlassCard style={{ marginBottom:16, padding:"12px 16px", background:"rgba(124,58,237,0.06)", border:"1px solid var(--purple-border)" }}>
        <div style={{ fontSize:12, fontWeight:600, color:"var(--purple)", marginBottom:6 }}>Permission Summary</div>
        <div style={{ display:"flex", gap:20, fontSize:12, color:"var(--text-2)" }}>
          <span><strong style={{color:"var(--green)"}}>ADMIN</strong>: Full control</span>
          <span><strong style={{color:"var(--purple)"}}>DOCTOR</strong>: View + Reports + Treatments</span>
          <span><strong style={{color:"var(--amber)"}}>RECEPTIONIST</strong>: Billing + Expenses + Pending</span>
        </div>
      </GlassCard>

      <GlassCard style={{ padding:0, overflow:"hidden" }}>
        <table>
          <thead><tr><th>Username</th><th>Role</th><th>Actions</th></tr></thead>
          <tbody>
            {users.map(u=>(
              <tr key={u.id}>
                <td style={{fontWeight:600}}>
                  {u.username}
                  {u.id===currentUser.id && <span className="badge badge-paid" style={{marginLeft:8}}>You</span>}
                </td>
                <td><span className={`badge ${roleColors[u.role]||"badge-partial"}`}>{u.role}</span></td>
                <td><div style={{display:"flex",gap:4}}>
                  <GlassBtn size="xs" variant="outline" onClick={()=>{setForm({...u,password:""});setModal("edit");setMsg("");}}>Edit</GlassBtn>
                  {u.id!==currentUser.id && <GlassBtn size="xs" variant="danger" onClick={()=>del(u.id)}>Delete</GlassBtn>}
                </div></td>
              </tr>
            ))}
          </tbody>
        </table>
      </GlassCard>

      {modal && (
        <Modal title={modal==="add"?"Add User":"Edit User"} onClose={()=>setModal(null)} width={400}>
          <Alert msg={msg}/>
          <Field label="Username" required><input value={form.username} onChange={e=>setForm({...form,username:e.target.value})}/></Field>
          <Field label={modal==="edit"?"New Password (blank to keep)":"Password"} required={modal==="add"}>
            <input type="password" value={form.password} onChange={e=>setForm({...form,password:e.target.value})}/>
          </Field>
          <Field label="Role">
            <select value={form.role} onChange={e=>setForm({...form,role:e.target.value})}>
              <option value="ADMIN">Admin</option>
              <option value="DOCTOR">Doctor</option>
              <option value="RECEPTIONIST">Receptionist</option>
            </select>
          </Field>
          <div style={{display:"flex",gap:8}}>
            <GlassBtn full onClick={save}>Save</GlassBtn>
            <GlassBtn full variant="ghost" onClick={()=>setModal(null)}>Cancel</GlassBtn>
          </div>
        </Modal>
      )}

      {showOwn && (
        <Modal title="Change My Password" onClose={()=>setShowOwn(false)} width={360}>
          <Alert msg={ownMsg}/>
          <Field label="Current Password"><input type="password" value={ownPw.old} onChange={e=>setOwnPw({...ownPw,old:e.target.value})}/></Field>
          <Field label="New Password"><input type="password" value={ownPw.newPw} onChange={e=>setOwnPw({...ownPw,newPw:e.target.value})}/></Field>
          <Field label="Confirm New Password"><input type="password" value={ownPw.confirm} onChange={e=>setOwnPw({...ownPw,confirm:e.target.value})}/></Field>
          <div style={{display:"flex",gap:8}}>
            <GlassBtn full onClick={changeOwnPw}>Change Password</GlassBtn>
            <GlassBtn full variant="ghost" onClick={()=>setShowOwn(false)}>Cancel</GlassBtn>
          </div>
        </Modal>
      )}
    </PageWrap>
  );
}

function Settings({ user, dbTick }) {
  const [clinicName, setClinicName] = useState(() => LS.get("rph_clinic_name","ROYAL PETS HOSPITAL"));
  const [address, setAddress] = useState(() => LS.get("rph_clinic_address","Royal Street, Khushi Trade Center, M.A Jinnah Road, Okara"));
  const [phone, setPhone] = useState(() => LS.get("rph_clinic_phone","0322-9544687"));
  const [saved, setSaved] = useState(false);
  const [showClearModal, setShowClearModal] = useState(false);
  const [clearStep, setClearStep] = useState(1);
  const [adminPass, setAdminPass] = useState("");
  const [passError, setPassError] = useState("");
  const [clearing, setClearing] = useState(false);
  const [clearDone, setClearDone] = useState(false);

  useEffect(() => {
    setClinicName(LS.get("rph_clinic_name","ROYAL PETS HOSPITAL"));
    setAddress(LS.get("rph_clinic_address","Royal Street, Khushi Trade Center, M.A Jinnah Road, Okara"));
    setPhone(LS.get("rph_clinic_phone","0322-9544687"));
  }, [dbTick]);

  const save = () => {
    LS.set("rph_clinic_name", clinicName);
    LS.set("rph_clinic_address", address);
    LS.set("rph_clinic_phone", phone);
    setSaved(true); setTimeout(()=>setSaved(false),2000);
  };

  const openClearModal = () => {
    setClearStep(1); setAdminPass(""); setPassError(""); setClearing(false); setClearDone(false);
    setShowClearModal(true);
  };
  const closeClearModal = () => { setShowClearModal(false); };
  const handleClearStep2 = () => setClearStep(2);
  const handleClearStep3 = async () => {
    setPassError("");
    const users = LS.get("rph_users", []);
    const adminUser = users.find(u => u.role === "ADMIN");
    if (!adminUser) return setPassError("No admin account found.");
    const hash = await sha256(adminPass);
    if (hash !== adminUser.passwordHash) return setPassError("❌ Incorrect admin password. Try again.");
    setClearStep(3);
  };
  const handleFinalClear = () => {
    setClearing(true);
    ["rph_bills","rph_expenses","rph_payment_logs"].forEach(k => LS.set(k, []));
    setTimeout(() => { setClearing(false); setClearDone(true); setTimeout(closeClearModal, 1800); }, 800);
  };

  // Google Drive state
  const [gdUser,     setGdUser]     = useState(()=> window._GD.user);
  const [gdOk,       setGdOk]       = useState(()=> window._GD.ok);
  const [gdSyncing,  setGdSyncing]  = useState(false);
  const [gdLastSync, setGdLastSync] = useState(()=> window._GD.lastSync);
  const [gdMsg,      setGdMsg]      = useState("");

  useEffect(() => {
    const h = () => {
      setGdUser({...window._GD.user});
      setGdOk(window._GD.ok);
      setGdSyncing(window._GD.syncing);
      setGdLastSync(window._GD.lastSync);
    };
    window.addEventListener("gd_status", h);
    return () => window.removeEventListener("gd_status", h);
  }, []);

  const handleConnect = async () => {
    setGdMsg("🔐 Opening Google sign-in…");
    // Try silent first (no popup) — works if user already granted consent
    let result = await gdSignIn(true);
    // If silent fails, show consent popup
    if (result.error) result = await gdSignIn(false);
    if (result.error === "gis_not_loaded") {
      setGdMsg("❌ Google Sign-In script not loaded. Check your internet connection.");
      setTimeout(()=>setGdMsg(""),5000); return;
    }
    if (result.error) { setGdMsg("❌ Sign-in failed: " + result.error); setTimeout(()=>setGdMsg(""),4000); return; }
    setGdMsg("✅ Connected! Loading data from Drive…");
    const driveData = await gdLoad();
    if (driveData) {
      const merged = mergeData(driveData, window.LOCAL_DB);
      Object.assign(window.LOCAL_DB, merged);
      lsWriteAll(window.LOCAL_DB);
      window.dispatchEvent(new Event('firebase_update'));
      if (window._FIREBASE_OK) {
        const batch = db.batch();
        for (const [k,v] of Object.entries(merged))
          batch.set(db.collection("erp_data").doc(k), { value: JSON.stringify(v) });
        await batch.commit().catch(()=>{});
      }
    }
    await gdSave();
    setGdMsg("✅ Synced! Google Drive is now backing up your data automatically.");
    setTimeout(()=>setGdMsg(""),4000);
  };

  const handleManualSync = async () => {
    setGdMsg("☁️ Syncing…");
    await gdSave();
    setGdMsg("✅ Synced to Google Drive!");
    setTimeout(()=>setGdMsg(""),3000);
  };

  const bills = LS.get("rph_bills",[]).length;
  const inv = LS.get("rph_inventory",[]).length;

  return (
    <PageWrap title="Settings" subtitle="Configure clinic information and system preferences">
      <div style={{ maxWidth:560 }}>
        <GlassCard style={{ marginBottom:20 }}>
          <div style={{ fontWeight:700, fontSize:15, marginBottom:16, color:"var(--purple)" }}>🏥 Clinic Information</div>
          <Alert msg={saved?"Settings saved successfully!":""} type="success"/>
          <Field label="Clinic Name"><input value={clinicName} onChange={e=>setClinicName(e.target.value)}/></Field>
          <Field label="Address"><input value={address} onChange={e=>setAddress(e.target.value)}/></Field>
          <Field label="Phone / WhatsApp"><input value={phone} onChange={e=>setPhone(e.target.value)}/></Field>
          <GlassBtn onClick={save}>Save Settings</GlassBtn>
        </GlassCard>

        {/* ── Google Drive Sync ── */}
        <GlassCard style={{ marginBottom:20, border:"2px solid rgba(66,133,244,0.4)", background:"rgba(240,247,255,0.8)" }}>
          <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:8 }}>
            <svg width="22" height="22" viewBox="0 0 87.3 78" xmlns="http://www.w3.org/2000/svg"><path d="m6.6 66.85 3.85 6.65c.8 1.4 1.95 2.5 3.3 3.3l13.75-23.8h-27.5c0 1.55.4 3.1 1.2 4.5z" fill="#0066da"/><path d="m43.65 25-13.75-23.8c-1.35.8-2.5 1.9-3.3 3.3l-25.4 44a9.06 9.06 0 0 0 -1.2 4.5h27.5z" fill="#00ac47"/><path d="m73.55 76.8c1.35-.8 2.5-1.9 3.3-3.3l1.6-2.75 7.65-13.25c.8-1.4 1.2-2.95 1.2-4.5h-27.502l5.852 11.5z" fill="#ea4335"/><path d="m43.65 25 13.75-23.8c-1.35-.8-2.9-1.2-4.5-1.2h-18.5c-1.6 0-3.15.45-4.5 1.2z" fill="#00832d"/><path d="m59.8 53h-32.3l-13.75 23.8c1.35.8 2.9 1.2 4.5 1.2h50.8c1.6 0 3.15-.45 4.5-1.2z" fill="#2684fc"/><path d="m73.4 26.5-12.7-22c-.8-1.4-1.95-2.5-3.3-3.3l-13.75 23.8 16.15 28h27.45c0-1.55-.4-3.1-1.2-4.5z" fill="#ffba00"/></svg>
            <div style={{ fontWeight:800, fontSize:15, color:"#1a73e8" }}>Google Drive Sync</div>
            {gdOk
              ? <span style={{ fontSize:11, background:"rgba(5,150,105,0.12)", color:"#059669", padding:"2px 10px", borderRadius:20, fontWeight:700 }}>● Live</span>
              : <span style={{ fontSize:11, background:"rgba(255,152,0,0.12)", color:"#D97706", padding:"2px 10px", borderRadius:20, fontWeight:700 }}>● Connecting…</span>
            }
          </div>
