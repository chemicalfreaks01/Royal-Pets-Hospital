// ─── SHA256 ───────────────────────────────────────────────────────────────────
async function sha256(msg) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}

// ── Wait for Google Identity Services to be ready ────────────────────────────
function _gisReady() {
  return new Promise(resolve => {
    if (window.google && window.google.accounts && window.google.accounts.oauth2) return resolve(true);
    let attempts = 0;
    const t = setInterval(() => {
      if (window.google && window.google.accounts && window.google.accounts.oauth2) { clearInterval(t); resolve(true); }
      if (++attempts > 40) { clearInterval(t); resolve(false); } // 4 second timeout
    }, 100);
  });
}

// ── Sign in with Google and get access token ─────────────────────────────────
// silent=true → no popup, only works if user already granted consent before
async function gdSignIn(silent) {
  const clientId = GD_CLIENT_ID;
  const ready = await _gisReady();
  if (!ready) return { error: "gis_not_loaded" };

  return new Promise(resolve => {
    const client = google.accounts.oauth2.initTokenClient({
      client_id: clientId,
      scope: [
        "https://www.googleapis.com/auth/drive.appdata",
        "https://www.googleapis.com/auth/userinfo.profile",
        "https://www.googleapis.com/auth/userinfo.email"
      ].join(" "),
      callback: async (resp) => {
        if (resp.error) return resolve({ error: resp.error });
        window._GD.token = resp.access_token;
        window._GD.ok    = true;
        // Fetch user profile
        try {
          const r = await fetch("https://www.googleapis.com/oauth2/v3/userinfo",
            { headers: { Authorization: "Bearer " + resp.access_token } });
          const u = await r.json();
          window._GD.user = { name: u.name, email: u.email, photo: u.picture };
          localStorage.setItem("rph_gd_user", JSON.stringify(window._GD.user));
        } catch(e) {}
        window.dispatchEvent(new Event("gd_status"));
        resolve({ ok: true });
      },
      error_callback: (err) => {
        resolve({ error: err.type || "popup_closed" });
      }
    });
    // silent=true uses "" prompt (no popup) — works after first-time consent
    client.requestAccessToken({ prompt: silent ? "" : "consent" });
  });
}

    // They will need to click Connect once; after that it's automatic forever
    console.log("ℹ️ Google Drive: first-time use on this browser — click Connect once");
  }
}

// ── Find or create the backup file ───────────────────────────────────────────
async function _gdFindOrCreate() {
  // Check cached file ID first
  const cached = localStorage.getItem("rph_gd_file_id");
  if (cached) { window._GD.fileId = cached; return cached; }

  const listRes = await fetch(
    `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name%3D%22${DRIVE_FILENAME}%22&fields=files(id)`,
    { headers: { Authorization: "Bearer " + window._GD.token } }
  );
  if (!listRes.ok) return null;
  const list = await listRes.json();
  if (list.files && list.files.length > 0) {
    window._GD.fileId = list.files[0].id;
    localStorage.setItem("rph_gd_file_id", window._GD.fileId);
    return window._GD.fileId;
  }
  // Create empty file
  const cr = await fetch("https://www.googleapis.com/drive/v3/files?fields=id", {
    method: "POST",
    headers: { Authorization:"Bearer "+window._GD.token, "Content-Type":"application/json" },
    body: JSON.stringify({ name: DRIVE_FILENAME, parents: ["appDataFolder"] })
  });
  if (!cr.ok) return null;
  const cd = await cr.json();
  window._GD.fileId = cd.id;
  localStorage.setItem("rph_gd_file_id", window._GD.fileId);
  return window._GD.fileId;
}

// ── Upload LOCAL_DB → Drive ───────────────────────────────────────────────────
async function gdSave() {
  if (!window._GD.token || window._GD.syncing) return;
  window._GD.syncing = true;
  window.dispatchEvent(new Event("gd_status"));
  try {
    const fileId = window._GD.fileId || await _gdFindOrCreate();
    if (!fileId) return;
    const body = JSON.stringify({ _saved: new Date().toISOString(), _v: 2, ...window.LOCAL_DB }, null, 2);
    const res = await fetch(
      `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`,
      { method:"PATCH", headers:{ Authorization:"Bearer "+window._GD.token, "Content-Type":"application/json" }, body }
    );
    if (res.ok) {
      window._GD.lastSync = new Date().toLocaleTimeString();
      localStorage.setItem("rph_gd_last_sync", window._GD.lastSync);
      window._GD.ok = true;
    } else if (res.status === 401) {
      // Token expired — try silent refresh
      window._GD.token = null; window._GD.ok = false;
      window.dispatchEvent(new Event("gd_status"));
      const refreshed = await gdSignIn(true);
      if (refreshed.ok) {
        // Retry the save once with new token
        window._GD.syncing = false;
        await gdSave();
        return;
      }
    }
  } catch(e) { console.warn("Drive save:", e); }
  finally { window._GD.syncing = false; window.dispatchEvent(new Event("gd_status")); }
}

// ── Download Drive → LOCAL_DB ─────────────────────────────────────────────────
async function gdLoad() {
  if (!window._GD.token) return null;
  try {
    const fileId = window._GD.fileId || await _gdFindOrCreate();
    if (!fileId) return null;
    const res = await fetch(
      `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
      { headers: { Authorization: "Bearer " + window._GD.token } }
    );
    if (!res.ok) return null;
    const data = await res.json();
    delete data._saved; delete data._v;
    return data;
  } catch(e) { return null; }
}

  clearTimeout(window._GD.timer);

// ═══════════════════════════════════════════════════════════════════════════════
// BULLETPROOF TRIPLE-LAYER STORAGE SYSTEM
// Layer 1: Firebase Firestore (primary, cloud, real-time)
// Layer 2: localStorage (always-on local backup, survives Firebase outages)
// Layer 3: Manual JSON export/import (disaster recovery)
// ═══════════════════════════════════════════════════════════════════════════════

window.LOCAL_DB = {};
window._DB_INITIALIZED = false;
window._DB_INITIALIZING = false;

// ── localStorage helpers (Layer 2) ────────────────────────────────────────────
const LS_PREFIX = "rph_backup__";
const LS_KEYS = ["rph_users","rph_inv_categories","rph_exp_categories","rph_treatments","rph_inventory","rph_bills","rph_expenses","rph_payment_logs","rph_init2"];

function lsWrite(k, v) {
  try { localStorage.setItem(LS_PREFIX + k, JSON.stringify(v)); } catch(e) { console.warn("localStorage write failed:", e); }
}
function lsRead(k, def) {
  try {
    const raw = localStorage.getItem(LS_PREFIX + k);
    if (raw === null) return def;
    return JSON.parse(raw);
  } catch(e) { return def; }
}
function lsWriteAll(db) {
  for (const [k, v] of Object.entries(db)) { lsWrite(k, v); }
}
function lsReadAll() {
  const out = {};
  for (const k of LS_KEYS) {
    const v = lsRead(k, null);
    if (v !== null) out[k] = v;
  }
  return out;
}

// ── Merge strategy: pick the copy with more records (or latest) ───────────────
function mergeData(firebaseData, localData) {
  const merged = { ...firebaseData };
  for (const k of LS_KEYS) {
    const fb = firebaseData[k];
    const ls = localData[k];
    if (ls === undefined || ls === null) continue;
    if (fb === undefined || fb === null) { merged[k] = ls; continue; }
    // For arrays, pick whichever has more entries
    if (Array.isArray(fb) && Array.isArray(ls)) {
      merged[k] = fb.length >= ls.length ? fb : ls;
    }
  }
  return merged;
}

// ── Firebase write queue (batched for performance) ─────────────────────────────
function flushWriteQueue() {
  const entries = Object.entries(window._WRITE_QUEUE);
  if (!entries.length) return;
  window._WRITE_QUEUE = {};
  if (!window._FIREBASE_OK) {
    // Firebase not available; entries are already saved to localStorage, skip
    return;
  }
  const batch = db.batch();
  for (const [k, v] of entries) {
    batch.set(db.collection("erp_data").doc(k), { value: JSON.stringify(v) });
  }
  batch.commit().catch(e => {
    console.error("Firebase batch write error, will retry:", e);
    for (const [k, v] of entries) { window._WRITE_QUEUE[k] = v; }
    window._WRITE_FLUSH_TIMER = setTimeout(flushWriteQueue, 5000);
  });
}

// ── Primary LS object used everywhere in the app ───────────────────────────────
const LS = {
  get: (k, def) => window.LOCAL_DB.hasOwnProperty(k) ? window.LOCAL_DB[k] : def,
  set: (k, v) => {
    window.LOCAL_DB[k] = v;
    // Always write to localStorage immediately (Layer 2)
    lsWrite(k, v);
    // Queue Firebase write (Layer 1)
    window._WRITE_QUEUE[k] = v;
    clearTimeout(window._WRITE_FLUSH_TIMER);
    window._WRITE_FLUSH_TIMER = setTimeout(flushWriteQueue, 300);
    window.dispatchEvent(new Event('firebase_update'));
    window.dispatchEvent(new Event('firebase_syncing'));
    // Layer 4: Google Drive (if signed in)
    gdSchedule();
  },
};

// ── Restore from JSON backup file ─────────────────────────────────────────────
function restoreFromBackup(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const data = JSON.parse(e.target.result);
        // Remove metadata keys
        delete data._backup_date; delete data._backup_version;
        // Write to LOCAL_DB and localStorage
        for (const [k, v] of Object.entries(data)) {
          window.LOCAL_DB[k] = v;
          lsWrite(k, v);
        }
        // Push to Firebase
        if (window._FIREBASE_OK) {
          const batch = db.batch();
          for (const [k, v] of Object.entries(data)) {
            batch.set(db.collection("erp_data").doc(k), { value: JSON.stringify(v) });
          }
          await batch.commit();
        }
        window.dispatchEvent(new Event('firebase_update'));
        resolve(Object.keys(data).length);
      } catch(err) { reject(err); }
    };
    reader.onerror = reject;
    reader.readAsText(file);
  });
}
window.restoreFromBackup = restoreFromBackup;

// ── Firebase real-time listener ────────────────────────────────────────────────
function attachSnapshot() {
  if (window._SNAPSHOT_UNSUB) { try { window._SNAPSHOT_UNSUB(); } catch(e) {} window._SNAPSHOT_UNSUB = null; }
  window._SNAPSHOT_UNSUB = db.collection("erp_data").onSnapshot(
    { includeMetadataChanges: false },
    snapshot => {
      window._FIREBASE_OK = true;
      snapshot.forEach(doc => {
        try {
          const parsed = JSON.parse(doc.data().value);
          // Only update LOCAL_DB if Firebase has equal or more data
          const existing = window.LOCAL_DB[doc.id];
          if (!Array.isArray(existing) || !Array.isArray(parsed) || parsed.length >= existing.length) {
            window.LOCAL_DB[doc.id] = parsed;
          }
        } catch(e) {}
      });
      // Sync merged data back to localStorage
      lsWriteAll(window.LOCAL_DB);
      window.dispatchEvent(new Event('firebase_update'));
      if (!window._DB_INITIALIZED) {
        window._DB_INITIALIZED = true;
        const cbs = window._DB_READY_CBS.splice(0);
        cbs.forEach(cb => { try { cb(); } catch(e) {} });
        // Schedule daily backup check after data loads
        setTimeout(checkAndAutoBackup, 3000);
      }
    },
    err => {
      console.error("Firestore snapshot error:", err);
      window._FIREBASE_OK = false;
      window._SNAPSHOT_UNSUB = null;
      // Fall back to whatever is in LOCAL_DB (already populated from localStorage)
      if (!window._DB_INITIALIZED) {
        window._DB_INITIALIZED = true;
        const cbs = window._DB_READY_CBS.splice(0);
        cbs.forEach(cb => { try { cb(); } catch(e) {} });
      }
      window.dispatchEvent(new Event('firebase_update'));
      clearTimeout(window._RECONNECT_TIMER);
      window._RECONNECT_TIMER = setTimeout(() => attachSnapshot(), 5000);
    }
  );
}

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && window._DB_INITIALIZED) {
    db.collection("erp_data").get().then(snap => {
      snap.forEach(doc => {
        try {
          const parsed = JSON.parse(doc.data().value);
          const existing = window.LOCAL_DB[doc.id];
          if (!Array.isArray(existing) || !Array.isArray(parsed) || parsed.length >= existing.length) {
            window.LOCAL_DB[doc.id] = parsed;
          }
        } catch(e) {}
      });
      lsWriteAll(window.LOCAL_DB);
      window.dispatchEvent(new Event('firebase_update'));
    }).catch(()=>{});
    attachSnapshot();
  }
});

async function initDB(onReady) {
  if (window._DB_INITIALIZED) { if (onReady) onReady(); return; }
  if (onReady) window._DB_READY_CBS.push(onReady);
  if (window._DB_INITIALIZING) return;
  window._DB_INITIALIZING = true;

  // ── Step 1: Load localStorage backup immediately (instant offline support) ──
  const localBackup = lsReadAll();
  const hasLocalBackup = Object.keys(localBackup).length > 0;
  if (hasLocalBackup) {
    Object.assign(window.LOCAL_DB, localBackup);
    console.log("✅ Loaded from localStorage backup:", Object.keys(localBackup).length, "collections");
  }

  // ── Step 2: Try Firebase ───────────────────────────────────────────────────
  try {
    const snap = await db.collection("erp_data").limit(1).get();
    window._FIREBASE_OK = true;

    if (snap.empty && !hasLocalBackup) {
      // Check Google Drive first before seeding defaults
      let driveRestored = false;
      if (window._GD.token) {
        const driveData = await gdLoad();
        if (driveData && Object.keys(driveData).length > 0) {
          console.log("✅ Restored from Google Drive backup!");
          const batch = db.batch();
          for (const [k, v] of Object.entries(driveData)) {

const pkr = n => "Rs. " + Number(n||0).toLocaleString("en-PK",{minimumFractionDigits:2,maximumFractionDigits:2});
const today = () => new Date().toISOString().slice(0,10);
const fmtDate = ts => new Date(ts).toLocaleDateString("en-PK",{day:"2-digit",month:"short",year:"numeric"});
const nextId = arr => arr.length ? Math.max(...arr.map(x=>x.id))+1 : 1;
const invoiceNum = () => "RPH-" + Date.now().toString().slice(-6);

function dateRange(mode, from, to) {
  const now = new Date(); now.setHours(23,59,59,999);
  const start = new Date();
  if (mode==="today") { start.setHours(0,0,0,0); }
  else if (mode==="week") { start.setDate(start.getDate()-start.getDay()); start.setHours(0,0,0,0); }
  else if (mode==="lastweek") {
    const s=new Date(); s.setDate(s.getDate()-s.getDay()-7); s.setHours(0,0,0,0);
    const e=new Date(); e.setDate(e.getDate()-e.getDay()-1); e.setHours(23,59,59,999);
    return [s.getTime(), e.getTime()];
  }
  else if (mode==="month") { start.setDate(1); start.setHours(0,0,0,0); }
  else if (mode==="custom") { return [new Date(from).getTime(), new Date(to+"T23:59:59").getTime()]; }
  else { return [0, now.getTime()]; }
  return [start.getTime(), now.getTime()];
}

// ─── SYNC INDICATOR ───────────────────────────────────────────────────────────
function SyncIndicator() {
  const [status, setStatus] = useState("synced");
  const [fbOk, setFbOk] = useState(true);
  useEffect(() => {
    const handleSyncing = () => { setStatus("syncing"); clearTimeout(window._syncTimer); window._syncTimer = setTimeout(() => setStatus("synced"), 1200); };
    const handleUpdate = () => setFbOk(window._FIREBASE_OK !== false);
    window.addEventListener('firebase_syncing', handleSyncing);
    window.addEventListener('firebase_update', handleUpdate);
    return () => { window.removeEventListener('firebase_syncing', handleSyncing); window.removeEventListener('firebase_update', handleUpdate); };
  }, []);

  if (!fbOk) return (
    <div style={{ display:"flex", alignItems:"center", gap:6, background:"rgba(217,119,6,0.12)", color:"#D97706", padding:"5px 10px", borderRadius:20, fontSize:11, fontWeight:600, border:"1px solid rgba(217,119,6,0.3)" }}>
      <span style={{ width:7, height:7, borderRadius:"50%", background:"#D97706", display:"inline-block" }} />
      ⚠️ Offline — Local Backup Active
    </div>
  );
  const c = status === "syncing"
    ? { bg:"var(--blue-bg)", color:"var(--blue)", dot:"#2563EB", label:"Saving to Cloud…" }
    : { bg:"var(--green-bg)", color:"var(--green)", dot:"#059669", label:"☁️ Cloud + Local Synced" };
  return (
    <div style={{ display:"flex", alignItems:"center", gap:6, background:c.bg, color:c.color, padding:"5px 10px", borderRadius:20, fontSize:11, fontWeight:600, border:`1px solid ${c.dot}33` }}>
      <span style={{ width:7, height:7, borderRadius:"50%", background:c.dot, display:"inline-block", animation: status==="syncing" ? "pulse 0.8s infinite" : "none" }} />
      {c.label}
    </div>
  );
}

// ─── LOGIN ────────────────────────────────────────────────────────────────────
function Login({ onLogin }) {
  const [un, setUn] = useState(() => { try { return localStorage.getItem("rph_saved_username") || "admin"; } catch(e) { return "admin"; } });
  const [pw, setPw] = useState(() => { try { return localStorage.getItem("rph_saved_password") || ""; } catch(e) { return ""; } });
  const [remember, setRemember] = useState(() => { try { return !!localStorage.getItem("rph_saved_username"); } catch(e) { return false; } });
  const [err, setErr] = useState("");
  const [loading, setLoading] = useState(false);

  // Auto-login is handled in App after DB is fully loaded (see App useEffect)

  const submit = async () => {
    if (!un || !pw) return setErr("Enter username and password.");
    setLoading(true); setErr("");
    const users = LS.get("rph_users", []);
    const user = users.find(u => u.username === un.trim());
    if (!user) { setLoading(false); return setErr("User not found."); }
    const h = await sha256(pw);
    if (h !== user.passwordHash) { setLoading(false); return setErr("Incorrect password."); }
    if (remember) {
      try { localStorage.setItem("rph_saved_username", un.trim()); localStorage.setItem("rph_saved_password", pw); } catch(e) {}
    } else {
      try { localStorage.removeItem("rph_saved_username"); localStorage.removeItem("rph_saved_password"); } catch(e) {}
    }
    setLoading(false);
    // Persist session so page refresh doesn't log out
    try { sessionStorage.setItem("rph_session_user", JSON.stringify(user)); } catch(e) {}
    onLogin(user);
  };

  return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center",
      background:"linear-gradient(135deg, #4C1D95 0%, #6D28D9 40%, #7C3AED 70%, #A855F7 100%)" }}>

        border: "1.5px solid rgba(255,255,255,0.25)", position:"relative"
      }}>
        <div style={{ textAlign:"center", marginBottom:32 }}>
          <div style={{ width:72, height:72, background:"rgba(255,255,255,0.2)", backdropFilter:"blur(10px)", borderRadius:20, display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto 16px", fontSize:36, boxShadow:"inset 0 1px 0 rgba(255,255,255,0.4)" }}>🐾</div>

              boxShadow: active ? "inset 0 1px 0 rgba(255,255,255,0.08)" : "none",

            }}>
              <span style={{ fontSize:16 }}>{n.icon}</span>
              {n.label}
              {active && <span style={{ marginLeft:"auto", width:6, height:6, borderRadius:"50%", background:"var(--purple-light)" }} />}
            </button>
          );
        })}
      </nav>
      <div style={{ padding:"12px 14px", borderTop:"1px solid rgba(255,255,255,0.06)" }}>

            {user.username[0].toUpperCase()}

            <div style={{ fontSize:13, color:"rgba(255,255,255,0.85)", fontWeight:600 }}>{user.username}</div>

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function Dashboard({ user, setPage }) {
  const [filter, setFilter] = useState("today");
  const [from, setFrom] = useState(today());
  const [to, setTo] = useState(today());
  const [payBill, setPayBill] = useState(null);
  const [payAmt, setPayAmt] = useState("");
  const [payMethod, setPayMethod] = useState("Cash");
  const [msg, setMsg] = useState("");

  const bills = LS.get("rph_bills", []);
  const expenses = LS.get("rph_expenses", []);
  const inventory = LS.get("rph_inventory", []);
  const [sMs, eMs] = dateRange(filter, from, to);

  const periodBills = bills.filter(b => b.date >= sMs && b.date <= eMs);
  const revenue = periodBills.filter(b=>!b.isInHouse).reduce((a,b) => a + (b.totalPaid||0), 0);
  const exp = expenses.filter(e => e.date >= sMs && e.date <= eMs).reduce((a,e) => a + e.amount, 0);
  const profit = revenue - exp;
  const pending = bills.filter(b => b.paymentStatus!=="PAID"&&!b.isInHouse).reduce((a,b) => a + (b.remainingAmount||0), 0);
  const lowStock = inventory.filter(i => i.quantity <= i.threshold);
  const pendingBills = bills.filter(b => b.paymentStatus!=="PAID");

  const chartData = useMemo(() => {
    const days = [];
    for (let i=6; i>=0; i--) {
      const d = new Date(); d.setDate(d.getDate()-i); d.setHours(0,0,0,0);
      const d2 = new Date(d); d2.setHours(23,59,59,999);
      const rev = bills.filter(b => b.date>=d.getTime()&&b.date<=d2.getTime()&&!b.isInHouse).reduce((a,b)=>a+(b.totalPaid||0),0);
      const ex = expenses.filter(e => e.date>=d.getTime()&&e.date<=d2.getTime()).reduce((a,e)=>a+e.amount,0);
      days.push({ label:d.toLocaleDateString("en-PK",{weekday:"short"}), revenue:rev, expense:ex });
    }
    return days;
  }, [bills, expenses]);

  const addPayment = () => {
    const amt = parseFloat(payAmt);
    if (isNaN(amt)||amt<=0) return setMsg("Enter valid amount.");
    if (amt > payBill.remainingAmount) return setMsg("Amount exceeds remaining balance.");
    const allBills = LS.get("rph_bills",[]);
    const idx = allBills.findIndex(b => b.id===payBill.id);
    if (idx<0) return;
    const newPaid = (allBills[idx].totalPaid||0)+amt;
    const newRem = allBills[idx].netPayable - newPaid;
    const newStatus = newRem<=0 ? "PAID" : newPaid>0 ? "PARTIAL" : "PENDING";
    const log = { date:Date.now(), amount:amt, method:payMethod, by:user.username, action:"Payment Added" };
    const logs = [...(allBills[idx].paymentLogs||[]), log];
    allBills[idx] = { ...allBills[idx], totalPaid:newPaid, remainingAmount:Math.max(0,newRem), paymentStatus:newStatus, paymentLogs:logs };
    LS.set("rph_bills", allBills);
    setPayBill(null); setPayAmt(""); setMsg("");
  };

  const canCollect = ["ADMIN","DOCTOR","RECEPTIONIST"].includes(user.role);

  return (
    <PageWrap title="Dashboard" subtitle="Overview of your clinic performance"
      action={<div style={{display:"flex",gap:8,alignItems:"center"}}>
        {canCollect && <GlassBtn onClick={()=>setPage("billing")}>+ New Invoice</GlassBtn>}
      </div>}>

      <GlassCard style={{ marginBottom:20, padding:"12px 16px" }}>
        <div style={{ display:"flex", gap:8, flexWrap:"wrap", alignItems:"center" }}>
          {[["today","Today"],["week","This Week"],["lastweek","Last Week"],["month","This Month"],["custom","Custom"]].map(([k,l]) => (
            <button key={k} onClick={()=>setFilter(k)} style={{ padding:"6px 14px", borderRadius:20, fontSize:12, fontWeight:600, background:filter===k?"linear-gradient(135deg,var(--purple),var(--purple-light))":"rgba(0,0,0,0.05)", color:filter===k?"white":"var(--text-2)", border:"none", cursor:"pointer", transition:"var(--transition)" }}>
              {l}
            </button>
          ))}
          {filter==="custom" && <>
            <input type="date" value={from} onChange={e=>setFrom(e.target.value)} style={{ width:140 }} />
            <span style={{color:"var(--text-3)"}}>—</span>
            <input type="date" value={to} onChange={e=>setTo(e.target.value)} style={{ width:140 }} />
          </>}
        </div>
      </GlassCard>

      <div style={{ display:"flex", gap:14, flexWrap:"wrap", marginBottom:20 }}>
        <StatCard label="Revenue Collected" value={pkr(revenue)} accent="var(--purple)" icon="💰" />
        <StatCard label="Total Expenses" value={pkr(exp)} accent="var(--amber)" icon="💸" />
        <StatCard label="Net Profit" value={pkr(profit)} accent={profit>=0?"var(--green)":"var(--red)"} icon="📈" />
        <StatCard label="Pending Payments" value={pkr(pending)} accent="var(--red)" icon="⏳" />
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginBottom:20 }}>
        <GlassCard>
          <div style={{ fontWeight:700, fontSize:14, color:"var(--text)", marginBottom:4 }}>Revenue vs Expenses</div>
          <div style={{ fontSize:12, color:"var(--text-3)", marginBottom:12 }}>Last 7 days  <span style={{display:"inline-block",width:10,height:10,background:"var(--purple)",borderRadius:2,marginLeft:8}}/>Revenue  <span style={{display:"inline-block",width:10,height:10,background:"#F59E0B",borderRadius:2,marginLeft:6}}/>Expenses</div>
          <MiniBarChart data={chartData} height={140} />
        </GlassCard>

        <GlassCard>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
            <div style={{ fontWeight:700, fontSize:14 }}>Pending Payments</div>
            <GlassBtn variant="outline" size="sm" onClick={()=>setPage("pending")}>View All</GlassBtn>
          </div>
          {pendingBills.slice(0,4).map(b => (
            <div key={b.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"8px 0", borderBottom:"1px solid var(--purple-border)" }}>
              <div>
                <div style={{ fontWeight:600, fontSize:13 }}>{b.ownerName} – {b.petName}</div>
                <div style={{ fontSize:11, color:"var(--text-3)" }}>{b.invoiceNumber} · {fmtDate(b.date)}</div>
              </div>
              <div style={{ textAlign:"right" }}>
                <div style={{ fontSize:13, fontWeight:700, color:"var(--red)", fontFamily:"'JetBrains Mono',monospace" }}>{pkr(b.remainingAmount)}</div>
                {canCollect && <GlassBtn size="xs" variant="success" style={{marginTop:2}} onClick={()=>{ setPayBill(b); setMsg(""); }}>Collect</GlassBtn>}
              </div>
            </div>
          ))}
          {pendingBills.length===0 && <div style={{ color:"var(--green)", fontSize:13, textAlign:"center", padding:16 }}>✓ No pending payments</div>}
        </GlassCard>
      </div>

      {lowStock.length > 0 && (
        <GlassCard style={{ borderLeft:"4px solid var(--amber)" }}>
          <div style={{ fontWeight:700, fontSize:14, color:"var(--amber)", marginBottom:12 }}>⚠ Low Stock Alert ({lowStock.length} items)</div>
          <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
            {lowStock.map(i => (
              <div key={i.id} style={{ background:"var(--amber-bg)", border:"1px solid #F59E0B44", borderRadius:"var(--radius-sm)", padding:"6px 12px", fontSize:12 }}>
                <span style={{ fontWeight:600 }}>{i.name}</span> — <span style={{ color:"var(--amber)", fontWeight:700 }}>{i.quantity} left</span>
              </div>
            ))}
          </div>
        </GlassCard>
      )}

      {payBill && (
        <Modal title={`Collect Payment — ${payBill.invoiceNumber}`} onClose={()=>setPayBill(null)} width={400}>
          <Alert msg={msg} />
          <div style={{ background:"var(--purple-bg)", borderRadius:"var(--radius-sm)", padding:"12px 16px", marginBottom:16, fontSize:13 }}>
            <div><strong>{payBill.ownerName}</strong> – {payBill.petName}</div>
            <div style={{ marginTop:4 }}>Remaining: <strong style={{color:"var(--red)",fontFamily:"'JetBrains Mono',monospace"}}>{pkr(payBill.remainingAmount)}</strong></div>
          </div>
          <Field label="Amount"><input type="number" value={payAmt} onChange={e=>setPayAmt(e.target.value)} placeholder="0.00" /></Field>
          <Field label="Payment Method">
            <select value={payMethod} onChange={e=>setPayMethod(e.target.value)}>
              <option>Cash</option><option>Card</option><option>Bank Transfer</option><option>JazzCash</option><option>EasyPaisa</option>
            </select>
          </Field>
          <div style={{display:"flex",gap:8}}>
            <GlassBtn full onClick={addPayment}>Confirm Payment</GlassBtn>
            <GlassBtn full variant="ghost" onClick={()=>setPayBill(null)}>Cancel</GlassBtn>
          </div>
        </Modal>
      )}
    </PageWrap>
  );
}

function Billing({ user, dbTick }) {
  const [tab, setTab] = useState("new");
  const [bills, setBills] = useState(() => LS.get("rph_bills", []));
  const [search, setSearch] = useState("");
  const [viewBill, setViewBill] = useState(null);
  const [adjustBill, setAdjustBill] = useState(null);
  const [discountBill, setDiscountBill] = useState(null);
  const [editItemsBill, setEditItemsBill] = useState(null);
  const [returnBill, setReturnBill] = useState(null);

  const refresh = useCallback(() => setBills(LS.get("rph_bills", [])), []);
  useEffect(() => { refresh(); }, [dbTick, refresh]);

  const canEdit = ["ADMIN","DOCTOR","RECEPTIONIST"].includes(user.role);
  const canDelete = user.role === "ADMIN";
  const canInHouse = ["ADMIN","DOCTOR"].includes(user.role);

  const deleteInvoice = (bill) => {
    if (!window.confirm(`Delete invoice ${bill.invoiceNumber}?\n\nThis action cannot be undone.`)) return;
    const updated = LS.get("rph_bills",[]).filter(b => b.id !== bill.id);
    LS.set("rph_bills", updated);
    refresh();
  };

  const filtered = useMemo(() => bills.filter(b =>
    b.ownerName?.toLowerCase().includes(search.toLowerCase()) ||
    b.petName?.toLowerCase().includes(search.toLowerCase()) ||
    b.invoiceNumber?.toLowerCase().includes(search.toLowerCase())
  ).sort((a,b)=>b.date-a.date), [bills, search]);

  const tabs = [
    ...(canEdit ? [["new","+ New Invoice"]] : []),
    ...(canInHouse ? [["inhouse","🏥 In-House Use"]] : []),
    ["list","All Invoices"],
  ];

  return (
    <PageWrap title="Billing" subtitle="Manage invoices and payments">
      <div style={{ display:"flex", gap:8, marginBottom:20 }}>
        {tabs.map(([k,l]) => (
          <button key={k} onClick={()=>setTab(k)} style={{ padding:"8px 20px", borderRadius:20, fontSize:13, fontWeight:600, background:tab===k?(k==="inhouse"?"linear-gradient(135deg,#D97706,#F59E0B)":"linear-gradient(135deg,var(--purple),var(--purple-light))"):"rgba(255,255,255,0.7)", color:tab===k?"white":"var(--text-2)", border:tab===k?"none":"1.5px solid var(--purple-border)", cursor:"pointer", boxShadow:tab===k?(k==="inhouse"?"0 4px 15px rgba(217,119,6,0.4)":"0 4px 15px rgba(124,58,237,0.35)"):"none" }}>
            {l}
          </button>
        ))}
      </div>

      {tab==="new" && canEdit && <BillingForm user={user} onSaved={()=>{ refresh(); setTab("list"); }} />}
      {tab==="inhouse" && canInHouse && <InHouseUsageForm user={user} onSaved={()=>{ refresh(); setTab("list"); }} />}
      {tab==="list" && (
        <GlassCard style={{ padding:0, overflow:"hidden" }}>
          <div style={{ padding:"16px 20px", borderBottom:"1px solid var(--purple-border)", background:"rgba(124,58,237,0.04)" }}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search by owner, pet or invoice #..." style={{ maxWidth:360 }} />
          </div>
          <div style={{overflowX:"auto"}}>
            <table>
              <thead><tr><th>Invoice</th><th>Owner</th><th>Pet</th><th>Date</th><th>Net</th><th>Paid</th><th>Remaining</th><th>Status</th><th>Actions</th></tr></thead>
              <tbody>
                {filtered.map(b => (
                  <tr key={b.id}>
                    <td style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:"var(--purple)",fontWeight:700}}>{b.invoiceNumber}</td>
                    <td style={{fontWeight:600}}>{b.ownerName}</td>
                    <td>{b.petName}</td>
                    <td style={{fontSize:12,color:"var(--text-3)"}}>{fmtDate(b.date)}</td>
                    <td style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,fontWeight:700}}>{pkr(b.netPayable)}</td>
                    <td style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:"var(--green)"}}>{pkr(b.totalPaid)}</td>
                    <td style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:b.remainingAmount>0?"var(--red)":"var(--green)"}}>{pkr(b.remainingAmount)}</td>
                    <td><span className={`badge badge-${b.paymentStatus.toLowerCase()}`}>{b.paymentStatus}</span>{b.isInHouse&&<span style={{marginLeft:4,background:"rgba(217,119,6,0.15)",color:"#D97706",fontSize:10,fontWeight:700,padding:"2px 6px",borderRadius:10}}>In-House</span>}{b.hasReturn&&<span style={{marginLeft:4,background:"rgba(220,38,38,0.12)",color:"var(--red)",fontSize:10,fontWeight:700,padding:"2px 6px",borderRadius:10}}>Return</span>}</td>
                    <td>
                      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                        <GlassBtn size="xs" variant="outline" onClick={()=>setViewBill(b)}>View</GlassBtn>
                        {canEdit && b.paymentStatus!=="PAID" && <GlassBtn size="xs" variant="success" onClick={()=>setAdjustBill(b)}>Pay</GlassBtn>}
                        {canEdit && <GlassBtn size="xs" variant="amber" onClick={()=>setDiscountBill(b)}>Disc</GlassBtn>}
                        {canEdit && <GlassBtn size="xs" style={{background:"linear-gradient(135deg,#2563EB,#3B82F6)",color:"white",boxShadow:"0 2px 8px rgba(37,99,235,0.3)"}} onClick={()=>setEditItemsBill(b)}>✏️ Items</GlassBtn>}
                        {canEdit && <GlassBtn size="xs" variant="danger" style={{background:"linear-gradient(135deg,#DC2626,#EF4444)"}} onClick={()=>setReturnBill(b)}>🔄 Return</GlassBtn>}
                        {canDelete && <GlassBtn size="xs" variant="danger" onClick={()=>deleteInvoice(b)}>🗑</GlassBtn>}
                      </div>
                    </td>
                  </tr>
                ))}
                {filtered.length===0 && <tr><td colSpan={9} style={{textAlign:"center",padding:32,color:"var(--text-3)"}}>No invoices found</td></tr>}
              </tbody>
            </table>
          </div>
        </GlassCard>
      )}

      {viewBill && <InvoiceModal bill={viewBill} onClose={()=>setViewBill(null)} user={user} onRefresh={()=>{refresh(); setViewBill(null);}} canDelete={canDelete} onDelete={()=>{ deleteInvoice(viewBill); setViewBill(null); }} />}
      {adjustBill && <PaymentAdjustModal bill={adjustBill} user={user} onClose={()=>setAdjustBill(null)} onSaved={()=>{refresh(); setAdjustBill(null);}} />}
      {discountBill && <DiscountModal bill={discountBill} user={user} onClose={()=>setDiscountBill(null)} onSaved={()=>{refresh(); setDiscountBill(null);}} />}
      {editItemsBill && <EditItemsModal bill={editItemsBill} user={user} onClose={()=>setEditItemsBill(null)} onSaved={()=>{refresh(); setEditItemsBill(null);}} />}
      {returnBill && <ReturnModal bill={returnBill} user={user} onClose={()=>setReturnBill(null)} onSaved={()=>{refresh(); setReturnBill(null);}} />}
    </PageWrap>
  );
}

function BillingForm({ user, onSaved }) {
  const [owner, setOwner] = useState(""); const [pet, setPet] = useState("");
  const [phone, setPhone] = useState("");
  const [species, setSpecies] = useState(""); const [breed, setBreed] = useState("");
  const [age, setAge] = useState(""); const [sex, setSex] = useState("Male");
  const [items, setItems] = useState([]);
  const [addType, setAddType] = useState("treatment");
  const [selectedId, setSelectedId] = useState("");
  const [itemQuery, setItemQuery] = useState("");
  const [dropOpen, setDropOpen] = useState(false);
  const [dropIdx, setDropIdx] = useState(-1);
  const [dropRect, setDropRect] = useState(null);
  const [qty, setQty] = useState(1);
  const [discType, setDiscType] = useState("fixed");
  const [discVal, setDiscVal] = useState("");
  const [paid, setPaid] = useState("");
  const [msg, setMsg] = useState(""); const [success, setSuccess] = useState("");
  const searchRef = useRef(null);
  const inputRef = useRef(null);

  const treatments = LS.get("rph_treatments", []);
  const inventory = LS.get("rph_inventory", []);

  // Close dropdown when clicking outside
  useEffect(() => {
    const handler = (e) => {
      if (searchRef.current && !searchRef.current.contains(e.target)) setDropOpen(false);
    };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, []);

  // Recalculate dropdown position whenever it opens
  useEffect(() => {
    if (dropOpen && inputRef.current) {
      const r = inputRef.current.getBoundingClientRect();
      setDropRect({ top: r.bottom + window.scrollY + 4, left: r.left + window.scrollX, width: r.width });
    }
  }, [dropOpen, itemQuery]);

  // Source list based on selected type
  const sourceList = addType === "treatment" ? treatments : inventory;

  // Filtered suggestions based on query
  const suggestions = itemQuery.trim() === ""
    ? sourceList
    : sourceList.filter(x => x.name.toLowerCase().includes(itemQuery.toLowerCase()));

  // Selected object resolved from selectedId
  const selectedObj = sourceList.find(x => x.id === parseInt(selectedId)) || null;

  const handleSelectSuggestion = (item) => {
    setSelectedId(String(item.id));
    setItemQuery(item.name);
    setDropOpen(false);
    setDropIdx(-1);
    setMsg("");
  };

  const handleTypeChange = (newType) => {
    setAddType(newType);
    setSelectedId("");
    setItemQuery("");
    setDropOpen(false);
    setDropIdx(-1);
  };

  const gross = items.reduce((a,i)=>a+i.totalPrice, 0);
  const discAmt = discType==="pct" ? (gross*(parseFloat(discVal)||0)/100) : (parseFloat(discVal)||0);
  const net = Math.max(0, gross - discAmt);
  const paidAmt = Math.min(parseFloat(paid)||0, net);
  const remaining = net - paidAmt;
  const status = remaining<=0&&net>0 ? "PAID" : paidAmt>0 ? "PARTIAL" : "PENDING";

  const addItem = () => {
    if (!selectedId) return setMsg("Please search and select an item first.");
    const obj = selectedObj;
    if (!obj) return setMsg("Item not found. Please select from the list.");
    const price = addType==="treatment" ? obj.price : obj.salePrice;
    const q = parseInt(qty)||1;
    if (addType==="product"&&obj.quantity<q) return setMsg(`Only ${obj.quantity} units in stock.`);
    setItems(prev=>[...prev, { id:nextId(prev), refId:obj.id, name:obj.name, type:addType, price, quantity:q, totalPrice:price*q }]);
    setSelectedId(""); setItemQuery(""); setQty(1); setMsg("");
  };

  const saveBill = () => {
    if (!owner.trim()) return setMsg("Owner name required.");
    if (!pet.trim()) return setMsg("Pet name required.");
    if (items.length===0) return setMsg("Add at least one item.");
    const allBills = LS.get("rph_bills",[]);
    const allInv = LS.get("rph_inventory",[]);
    items.filter(i=>i.type==="product").forEach(item=>{
      const idx=allInv.findIndex(i=>i.id===item.refId);
      if (idx>=0) allInv[idx]={...allInv[idx], quantity:Math.max(0,allInv[idx].quantity-item.quantity)};
    });
    LS.set("rph_inventory",allInv);
    const bill={
      id:nextId(allBills), invoiceNumber:invoiceNum(), ownerName:owner.trim(), petName:pet.trim(),
      phone:phone.trim(), species, breed, age, sex, date:Date.now(),
      totalAmount:gross, discountAmount:discAmt, discountLabel:discVal?`${discVal}${discType==="pct"?"%":" PKR"}`:"",
      netPayable:net, totalPaid:paidAmt, remainingAmount:remaining, paymentStatus:status,
      itemsJson:JSON.stringify(items), createdByUsername:user.username, paymentLogs:paidAmt>0?[{date:Date.now(),amount:paidAmt,method:"Cash",by:user.username,action:"Initial Payment"}]:[],
    };
    allBills.push(bill); LS.set("rph_bills",allBills);
    setSuccess(`Invoice ${bill.invoiceNumber} saved!`);
    setTimeout(()=>{ setSuccess(""); onSaved(); },1400);
  };

  return (
    <div style={{ display:"flex", gap:20, flexWrap:"wrap" }}>
      <div style={{ flex:2, minWidth:340 }}>
        <Alert msg={msg}/><Alert msg={success} type="success"/>
        <GlassCard style={{ marginBottom:16 }}>
          <div style={{ fontWeight:700, fontSize:14, color:"var(--purple)", marginBottom:14 }}>1. Patient & Owner Info</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
            <Field label="Owner Name" required><input value={owner} onChange={e=>setOwner(e.target.value)}/></Field>
            <Field label="Pet Name" required><input value={pet} onChange={e=>setPet(e.target.value)}/></Field>
            <Field label="Phone Number"><input value={phone} onChange={e=>setPhone(e.target.value)} placeholder="e.g. 0321-1234567" type="tel"/></Field>
            <Field label="Species"><input value={species} onChange={e=>setSpecies(e.target.value)} placeholder="Dog, Cat…"/></Field>
            <Field label="Breed"><input value={breed} onChange={e=>setBreed(e.target.value)}/></Field>
            <Field label="Age"><input value={age} onChange={e=>setAge(e.target.value)} placeholder="2 years"/></Field>
            <Field label="Sex"><select value={sex} onChange={e=>setSex(e.target.value)}><option>Male</option><option>Female</option><option>Unknown</option></select></Field>
          </div>
        </GlassCard>
        <GlassCard style={{ marginBottom:16 }}>
          <div style={{ fontWeight:700, fontSize:14, color:"var(--purple)", marginBottom:14 }}>2. Add Items & Treatments</div>
          <div style={{ display:"flex", gap:10, flexWrap:"wrap", alignItems:"flex-end" }}>
            <div style={{ flex:"0 0 140px" }}>
              <Field label="Type">
                <select value={addType} onChange={e=>handleTypeChange(e.target.value)}>
                  <option value="treatment">Treatment</option>
                  <option value="product">Product</option>
                </select>
              </Field>
            </div>
            <div style={{ flex:2, minWidth:200 }} ref={searchRef}>
              <Field label={addType==="treatment" ? "Search Treatment" : "Search Product"}>
                <div style={{ position:"relative" }}>
                  <input
                    ref={inputRef}
                    value={itemQuery}
                    onChange={e => {
                      setItemQuery(e.target.value);
                      setSelectedId("");
                      setDropOpen(true);
                      setDropIdx(-1);
                    }}
                    onFocus={() => setDropOpen(true)}
                    onKeyDown={e => {
                      if (!dropOpen || suggestions.length === 0) return;
                      if (e.key === "ArrowDown") { e.preventDefault(); setDropIdx(i => Math.min(i+1, suggestions.length-1)); }
                      else if (e.key === "ArrowUp") { e.preventDefault(); setDropIdx(i => Math.max(i-1, 0)); }
                      else if (e.key === "Enter" && dropIdx >= 0) { e.preventDefault(); handleSelectSuggestion(suggestions[dropIdx]); }
                      else if (e.key === "Escape") setDropOpen(false);
                    }}
                    placeholder={addType==="treatment" ? "Type to search treatments…" : "Type to search products…"}
                    autoComplete="off"
                    style={{ paddingRight: (itemQuery || selectedId) ? 28 : 10 }}
                  />
                  {/* Clear button */}
                  {(itemQuery || selectedId) && (
                    <span
                      onMouseDown={e => { e.preventDefault(); setItemQuery(""); setSelectedId(""); setDropOpen(true); }}
                      style={{ position:"absolute", right:8, top:"50%", transform:"translateY(-50%)", cursor:"pointer", color:"var(--text-3)", fontSize:14, lineHeight:1, userSelect:"none" }}
                    >✕</span>
                  )}
                </div>
              </Field>
              {/* Selected item confirmation chip */}
              {selectedObj && (
                <div style={{ marginTop:4, fontSize:12, color:"var(--purple)", display:"flex", alignItems:"center", gap:6 }}>
                  <span style={{ background:"var(--purple-bg)", padding:"2px 8px", borderRadius:20, fontWeight:600 }}>
                    ✓ {selectedObj.name} — {pkr(addType==="treatment" ? selectedObj.price : selectedObj.salePrice)}
                    {addType==="product" && ` (${selectedObj.quantity} in stock)`}
                  </span>
                </div>
              )}
              {/* Portal dropdown — rendered fixed so it escapes all overflow/clip parents */}
              {dropOpen && dropRect && ReactDOM.createPortal(
                <div
                  onMouseDown={e => e.preventDefault()}
                  style={{
                    position:"fixed",
                    top: dropRect.top,
                    left: dropRect.left,
                    width: dropRect.width,
                    zIndex: 99999,
                    background:"#ffffff",
                    border:"1.5px solid var(--purple-border)",
                    borderRadius:"var(--radius-sm)",
                    boxShadow:"0 12px 40px rgba(124,58,237,0.22), 0 2px 8px rgba(0,0,0,0.10)",
                    maxHeight:240,
                    overflowY:"auto"
                  }}
                >
                  {suggestions.length === 0 ? (
                    <div style={{ padding:"12px 14px", fontSize:13, color:"var(--text-3)", textAlign:"center" }}>
                      No {addType === "treatment" ? "treatments" : "products"} found
                    </div>
                  ) : suggestions.map((item, i) => {
                    const isActive = dropIdx === i;
                    const isSelected = selectedId === String(item.id);
                    const price = addType === "treatment" ? item.price : item.salePrice;
                    const stock = addType === "product" ? item.quantity : null;
                    return (
                      <div
                        key={item.id}
                        onMouseDown={e => { e.preventDefault(); handleSelectSuggestion(item); }}
                        onMouseEnter={() => setDropIdx(i)}
                        style={{
                          padding:"10px 14px", cursor:"pointer", fontSize:13,
                          background: isSelected ? "var(--purple-bg)" : isActive ? "rgba(124,58,237,0.07)" : "transparent",
                          borderBottom: i < suggestions.length-1 ? "1px solid rgba(124,58,237,0.1)" : "none",
                          display:"flex", alignItems:"center", justifyContent:"space-between", gap:8,
                          transition:"background 0.1s"
                        }}
                      >
                        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                          {isSelected && <span style={{ color:"var(--purple)", fontSize:12 }}>✓</span>}
                          <span style={{ color:"#1a1a2e", fontWeight: isSelected ? 600 : 400 }}>{item.name}</span>
                        </div>
                        <div style={{ display:"flex", alignItems:"center", gap:6, flexShrink:0 }}>
                          <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:11, color:"var(--purple)", fontWeight:600 }}>{pkr(price)}</span>
                          {stock !== null && (
                            <span style={{ fontSize:10, padding:"2px 7px", borderRadius:10, background: stock <= 5 ? "rgba(220,38,38,0.1)" : "rgba(5,150,105,0.1)", color: stock <= 5 ? "#DC2626" : "#059669", fontWeight:600 }}>
                              {stock} left
                            </span>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>,
                document.body
              )}
            </div>
            <div style={{ flex:"0 0 80px" }}>
              <Field label="Qty"><input type="number" min={1} value={qty} onChange={e=>setQty(e.target.value)}/></Field>
            </div>
            <div style={{ paddingBottom:14 }}><GlassBtn onClick={addItem}>Add</GlassBtn></div>
          </div>
          {items.length>0 && (
            <table style={{marginTop:8}}>
              <thead><tr><th>Item</th><th>Type</th><th>Qty</th><th>Price</th><th>Total</th><th></th></tr></thead>
              <tbody>{items.map(i=>(
                <tr key={i.id}>
                  <td style={{fontWeight:600}}>{i.name}</td>
                  <td><span className={`badge ${i.type==="treatment"?"badge-paid":"badge-purple"}`}>{i.type}</span></td>
                  <td>{i.quantity}</td>
                  <td style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>{pkr(i.price)}</td>
                  <td style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,fontWeight:700}}>{pkr(i.totalPrice)}</td>
                  <td><GlassBtn size="xs" variant="danger" onClick={()=>setItems(prev=>prev.filter(x=>x.id!==i.id))}>✕</GlassBtn></td>
                </tr>
              ))}</tbody>
            </table>
          )}
        </GlassCard>
        <GlassCard>
          <div style={{ fontWeight:700, fontSize:14, color:"var(--purple)", marginBottom:14 }}>3. Discount & Payment</div>
          <div style={{ display:"flex", gap:12, flexWrap:"wrap" }}>
            <div style={{flex:1,minWidth:130}}>
              <Field label="Discount Type">
                <select value={discType} onChange={e=>setDiscType(e.target.value)}>
                  <option value="fixed">Fixed (PKR)</option><option value="pct">Percentage (%)</option>
                </select>
              </Field>
            </div>
            <div style={{flex:1,minWidth:100}}>
              <Field label="Discount Value"><input type="number" min={0} value={discVal} onChange={e=>setDiscVal(e.target.value)} placeholder="0"/></Field>
            </div>
            <div style={{flex:1,minWidth:130}}>
              <Field label="Amount Paid (PKR)"><input type="number" min={0} value={paid} onChange={e=>setPaid(e.target.value)} placeholder="0.00"/></Field>
            </div>
          </div>
        </GlassCard>
      </div>
      <div style={{ flex:1, minWidth:220 }}>
        <GlassCard style={{ position:"sticky", top:20, border:"2px solid var(--purple-border)" }}>
          <div style={{ fontWeight:700, fontSize:15, color:"var(--text)", marginBottom:16, background:"linear-gradient(135deg,var(--purple),var(--purple-light))", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent" }}>Invoice Summary</div>
          {[
            ["Gross Total", pkr(gross), "var(--text)"],
            ["Discount", `- ${pkr(discAmt)}`, "var(--amber)", false],
            ["Net Payable", pkr(net), "var(--purple)", true],
            ["Paid", pkr(paidAmt), "var(--green)", false],
            ["Remaining", pkr(remaining), "var(--red)", false],
          ].map(([lbl,val,col,bold])=>(
            <div key={lbl} style={{ display:"flex", justifyContent:"space-between", padding:"7px 0", borderBottom:"1px solid var(--purple-border)", fontSize:13 }}>
              <span style={{ color:"var(--text-2)", fontWeight:bold?700:400 }}>{lbl}</span>
              <span style={{ color:col, fontWeight:bold?800:600, fontFamily:"'JetBrains Mono',monospace", fontSize:12 }}>{val}</span>
            </div>
          ))}
          <div style={{ textAlign:"center", margin:"14px 0 8px" }}>
            <span className={`badge badge-${status.toLowerCase()}`} style={{ fontSize:13, padding:"5px 16px" }}>{status}</span>
          </div>
          <GlassBtn full onClick={saveBill} size="lg" style={{marginTop:4}}>💾 Save Invoice</GlassBtn>
        </GlassCard>
      </div>
    </div>
  );
}

function PaymentAdjustModal({ bill, user, onClose, onSaved }) {
  const [amt, setAmt] = useState("");
  const [method, setMethod] = useState("Cash");
  const [msg, setMsg] = useState("");
  const logs = bill.paymentLogs || [];

  const save = () => {
    const a = parseFloat(amt);
    if (isNaN(a)||a<=0) return setMsg("Enter valid amount.");
    if (a > bill.remainingAmount) return setMsg("Exceeds remaining balance.");
    const allBills = LS.get("rph_bills",[]);
    const idx = allBills.findIndex(b=>b.id===bill.id);
    if (idx<0) return;
    const newPaid = (allBills[idx].totalPaid||0)+a;
    const newRem = allBills[idx].netPayable - newPaid;
    const newStatus = newRem<=0?"PAID":newPaid>0?"PARTIAL":"PENDING";
    const log = { date:Date.now(), amount:a, method, by:user.username, action:"Payment Added" };
    allBills[idx] = { ...allBills[idx], totalPaid:newPaid, remainingAmount:Math.max(0,newRem), paymentStatus:newStatus, paymentLogs:[...logs, log] };
    LS.set("rph_bills",allBills); onSaved();
  };

  return (
    <Modal title={`Payment — ${bill.invoiceNumber}`} onClose={onClose} width={480}>
      <Alert msg={msg}/>
      <div style={{ background:"var(--purple-bg)", borderRadius:"var(--radius-sm)", padding:"12px 16px", marginBottom:16 }}>
        <div style={{ fontSize:13, fontWeight:600 }}>{bill.ownerName} – {bill.petName}</div>
        <div style={{ display:"flex", gap:20, marginTop:6, fontSize:12 }}>
          <span>Net: <strong style={{fontFamily:"'JetBrains Mono',monospace"}}>{pkr(bill.netPayable)}</strong></span>
          <span>Paid: <strong style={{color:"var(--green)",fontFamily:"'JetBrains Mono',monospace"}}>{pkr(bill.totalPaid)}</strong></span>
          <span>Remaining: <strong style={{color:"var(--red)",fontFamily:"'JetBrains Mono',monospace"}}>{pkr(bill.remainingAmount)}</strong></span>
        </div>
      </div>
      <div style={{ display:"flex", gap:12 }}>
        <Field label="Amount to Pay" style={{flex:1}}><input type="number" value={amt} onChange={e=>setAmt(e.target.value)} placeholder="0.00"/></Field>
        <Field label="Method" style={{flex:1}}>
          <select value={method} onChange={e=>setMethod(e.target.value)}>
            <option>Cash</option><option>Card</option><option>Bank Transfer</option><option>JazzCash</option><option>EasyPaisa</option>
          </select>
        </Field>
      </div>
      <div style={{ display:"flex", gap:8, marginBottom:16 }}>
        <GlassBtn full onClick={save}>Confirm Payment</GlassBtn>
        <GlassBtn full variant="ghost" onClick={onClose}>Cancel</GlassBtn>
      </div>
      {logs.length>0 && (
        <div>
          <div style={{ fontWeight:700, fontSize:13, marginBottom:8, color:"var(--text-2)" }}>Payment History</div>
          <table>
            <thead><tr><th>Date</th><th>Amount</th><th>Method</th><th>By</th></tr></thead>
            <tbody>
              {logs.map((l,i)=>(
                <tr key={i}>
                  <td style={{fontSize:12}}>{fmtDate(l.date)}</td>
                  <td style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,fontWeight:700,color:"var(--green)"}}>{pkr(l.amount)}</td>
                  <td>{l.method}</td>
                  <td style={{fontSize:12,color:"var(--text-3)"}}>{l.by}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </Modal>
  );
}

function DiscountModal({ bill, user, onClose, onSaved }) {
  const [discType, setDiscType] = useState("fixed");
  const [discVal, setDiscVal] = useState("");
  const [msg, setMsg] = useState("");

  const discAmt = discType==="pct" ? (bill.totalAmount*(parseFloat(discVal)||0)/100) : (parseFloat(discVal)||0);
  const newNet = Math.max(0, bill.totalAmount - discAmt);
  const newRem = Math.max(0, newNet - (bill.totalPaid||0));
  const newStatus = newRem<=0&&newNet>0?"PAID":(bill.totalPaid||0)>0?"PARTIAL":"PENDING";

  const save = () => {
    if (discAmt < 0) return setMsg("Discount cannot be negative.");
    if (discAmt > bill.totalAmount) return setMsg("Discount exceeds gross total.");
    const allBills = LS.get("rph_bills",[]);
    const idx = allBills.findIndex(b=>b.id===bill.id);
    if (idx<0) return;
    const log = { date:Date.now(), amount:discAmt, method:"Discount", by:user.username, action:`Discount Applied: ${discVal}${discType==="pct"?"%":" PKR"}` };
    allBills[idx] = { ...allBills[idx], discountAmount:discAmt, discountLabel:`${discVal}${discType==="pct"?"%":" PKR"}`, netPayable:newNet, remainingAmount:newRem, paymentStatus:newStatus, paymentLogs:[...(allBills[idx].paymentLogs||[]), log] };
    LS.set("rph_bills",allBills); onSaved();
  };

  return (
    <Modal title={`Apply Discount — ${bill.invoiceNumber}`} onClose={onClose} width={420}>
      <Alert msg={msg}/>
      <div style={{ background:"var(--purple-bg)", borderRadius:"var(--radius-sm)", padding:"10px 14px", marginBottom:14, fontSize:13 }}>
        Gross Total: <strong style={{fontFamily:"'JetBrains Mono',monospace"}}>{pkr(bill.totalAmount)}</strong>
      </div>
      <div style={{ display:"flex", gap:12 }}>
        <Field label="Type" style={{flex:1}}>
          <select value={discType} onChange={e=>setDiscType(e.target.value)}>
            <option value="fixed">Fixed (PKR)</option><option value="pct">Percentage (%)</option>
          </select>
        </Field>
        <Field label="Value" style={{flex:1}}>
          <input type="number" min={0} value={discVal} onChange={e=>setDiscVal(e.target.value)} placeholder="0"/>
        </Field>
      </div>
      <div style={{ background:"rgba(0,0,0,0.04)", borderRadius:"var(--radius-sm)", padding:"10px 14px", marginBottom:14, fontSize:13 }}>
        <div>Discount: <strong style={{color:"var(--amber)",fontFamily:"'JetBrains Mono',monospace"}}>- {pkr(discAmt)}</strong></div>
        <div>New Net: <strong style={{color:"var(--purple)",fontFamily:"'JetBrains Mono',monospace"}}>{pkr(newNet)}</strong></div>
        <div>New Remaining: <strong style={{color:"var(--red)",fontFamily:"'JetBrains Mono',monospace"}}>{pkr(newRem)}</strong></div>
      </div>
      <div style={{ display:"flex", gap:8 }}>
        <GlassBtn full onClick={save}>Apply Discount</GlassBtn>
        <GlassBtn full variant="ghost" onClick={onClose}>Cancel</GlassBtn>
      </div>
    </Modal>
  );
}

function InvoiceModal({ bill, onClose, user, onRefresh, canDelete, onDelete }) {
  const items = JSON.parse(bill.itemsJson||"[]");
  const logs = bill.paymentLogs || [];
  const [showShare, setShowShare] = useState(false);
  const [copied, setCopied] = useState(false);
  const [editMode, setEditMode] = useState(false);
  const [editMsg, setEditMsg] = useState("");
  const canEditBilling = ["ADMIN","DOCTOR"].includes(user.role);

  // Edit form state — details everyone can change
  const [editOwner, setEditOwner] = useState(bill.ownerName||"");
  const [editPet, setEditPet] = useState(bill.petName||"");
  const [editPhone, setEditPhone] = useState(bill.phone||"");
  const [editSpecies, setEditSpecies] = useState(bill.species||"");
  const [editBreed, setEditBreed] = useState(bill.breed||"");
  const [editAge, setEditAge] = useState(bill.age||"");
  const [editSex, setEditSex] = useState(bill.sex||"Male");
  const [editNotes, setEditNotes] = useState(bill.notes||"");
  // Billing fields — ADMIN & DOCTOR only
  const [editDiscType, setEditDiscType] = useState("fixed");
  const [editDiscVal, setEditDiscVal] = useState(String(bill.discountAmount||""));
  const [editPaid, setEditPaid] = useState(String(bill.totalPaid||""));

  const saveEdits = () => {
    if (!editOwner.trim()) return setEditMsg("Owner name required.");
    if (!editPet.trim()) return setEditMsg("Pet name required.");
    const allBills = LS.get("rph_bills",[]);
    const idx = allBills.findIndex(b=>b.id===bill.id);
    if (idx<0) return;
    const updated = { ...allBills[idx], ownerName:editOwner.trim(), petName:editPet.trim(), phone:editPhone.trim(), species:editSpecies, breed:editBreed, age:editAge, sex:editSex, notes:editNotes };
    if (canEditBilling) {
      const discAmt = parseFloat(editDiscVal)||0;
      const newNet = Math.max(0, allBills[idx].totalAmount - discAmt);
      const newPaid = Math.min(parseFloat(editPaid)||0, newNet);
      const newRem = Math.max(0, newNet - newPaid);
      const newStatus = newRem<=0&&newNet>0?"PAID":newPaid>0?"PARTIAL":"PENDING";
      updated.discountAmount = discAmt;
      updated.discountLabel = discAmt>0?`${editDiscVal} PKR`:"";
      updated.netPayable = newNet;
      updated.totalPaid = newPaid;
      updated.remainingAmount = newRem;
      updated.paymentStatus = newStatus;
    }
    allBills[idx] = updated;
    LS.set("rph_bills", allBills);
    setEditMode(false); setEditMsg("");
    if (onRefresh) onRefresh();
  };

  // Build plain-text invoice for WhatsApp / SMS / clipboard
  const buildTextInvoice = () => {
    const line = "─".repeat(32);
    const itemLines = items.map((it,i) =>
      `  ${i+1}. ${it.name}\n     ${it.quantity} x Rs.${Number(it.price).toLocaleString("en-PK")} = Rs.${Number(it.totalPrice).toLocaleString("en-PK")}`
    ).join("\n");
    return [
      "🐾 *ROYAL PETS HOSPITAL*",
      "_Veterinary Diagnostic Centre, Okara_",
      line,
      `📄 *Invoice:* ${bill.invoiceNumber}`,
      `📅 *Date:* ${fmtDate(bill.date)}`,
      line,
      `👤 *Owner:* ${bill.ownerName}`,
      bill.phone ? `📱 *Phone:* ${bill.phone}` : "",
      `🐾 *Pet:* ${bill.petName}${bill.species ? " (" + bill.species + ")" : ""}`,
      line,
      "*Items & Treatments:*",
      itemLines,
      line,
      `💰 *Gross Total:*  Rs.${Number(bill.totalAmount).toLocaleString("en-PK")}`,
      bill.discountAmount > 0 ? `🏷️ *Discount:*      - Rs.${Number(bill.discountAmount).toLocaleString("en-PK")}` : "",
      `✅ *Net Payable:*  Rs.${Number(bill.netPayable).toLocaleString("en-PK")}`,
      `💵 *Paid:*         Rs.${Number(bill.totalPaid).toLocaleString("en-PK")}`,
      bill.remainingAmount > 0 ? `⏳ *Remaining:*    Rs.${Number(bill.remainingAmount).toLocaleString("en-PK")}` : "",
      line,
      `📍 Royal Street, Khushi Trade Center, Okara`,
      `📱 WhatsApp: 0322-9544687 | ⏰ 10AM–10PM`,
    ].filter(Boolean).join("\n");
  };

  const buildEmailBody = () => {
    const itemLines = items.map((it,i) =>
      `${i+1}. ${it.name} | Qty: ${it.quantity} | Unit: Rs.${Number(it.price).toLocaleString("en-PK")} | Total: Rs.${Number(it.totalPrice).toLocaleString("en-PK")}`
    ).join("\n");
    return encodeURIComponent([
      `ROYAL PETS HOSPITAL — Invoice ${bill.invoiceNumber}`,
      "",
      `Date: ${fmtDate(bill.date)}`,
      `Owner: ${bill.ownerName}`,
      bill.phone ? `Phone: ${bill.phone}` : "",
      `Pet: ${bill.petName}${bill.species ? " (" + bill.species + ")" : ""}`,
      "",
      "Items & Treatments:",
      itemLines,
      "",
      `Gross Total:  Rs.${Number(bill.totalAmount).toLocaleString("en-PK")}`,
      bill.discountAmount > 0 ? `Discount:     - Rs.${Number(bill.discountAmount).toLocaleString("en-PK")}` : "",
      `Net Payable:  Rs.${Number(bill.netPayable).toLocaleString("en-PK")}`,
      `Paid:         Rs.${Number(bill.totalPaid).toLocaleString("en-PK")}`,
      bill.remainingAmount > 0 ? `Remaining:    Rs.${Number(bill.remainingAmount).toLocaleString("en-PK")}` : "",
      "",
      "Royal Street, Khushi Trade Center, M.A Jinnah Road, Okara",
      "WhatsApp: 0322-9544687 | Timings: 10:00 AM – 10:00 PM",
    ].filter(Boolean).join("\n"));
  };

  // Opens the full visual invoice in a new tab (for screenshot/sharing)
  const openVisualInvoice = () => {
    const w = window.open("","_blank","width=820,height=1000");
    w.document.write(buildPrintHTML());
    w.document.close();
  };

  const shareViaWhatsApp = () => {
    const text = encodeURIComponent(buildTextInvoice());
    const phone = bill.phone ? bill.phone.replace(/[^0-9]/g,"") : "";
    const waPhone = phone.startsWith("0") ? "92" + phone.slice(1) : phone;
    // Open WhatsApp Web directly in new tab
    const url = waPhone ? `https://wa.me/${waPhone}?text=${text}` : `https://web.whatsapp.com/send?text=${text}`;
    window.open(url, "_blank");
  };

  const shareViaEmail = () => {
    const subject = encodeURIComponent(`Invoice ${bill.invoiceNumber} — Royal Pets Hospital`);
    const body = buildEmailBody();
    // Open Gmail compose directly in new tab
    window.open(`https://mail.google.com/mail/?view=cm&fs=1&su=${subject}&body=${body}`, "_blank");
  };

  const shareViaSMS = () => {
    const text = encodeURIComponent(buildTextInvoice());
    window.open(`sms:${bill.phone||""}?body=${text}`, "_blank");
  };

  // ── Thermal Print (58mm / 80mm receipt) ──────────────────────────────────────
  const buildThermalHTML = (width=58) => {
    const mmPx = width === 58 ? "220px" : "302px";
    const itemLines = items.map((it,i) => `
      <div class="item-row">
        <div class="item-name">${i+1}. ${it.name}</div>
        <div class="item-detail">${it.quantity} x Rs.${Number(it.price).toLocaleString("en-PK")} = <b>Rs.${Number(it.totalPrice).toLocaleString("en-PK")}</b></div>
      </div>`).join("");
